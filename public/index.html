  _stopRetroScroll();
  requestAnimationFrame(()=>{
    const el=document.querySelector('.gl-thread');
    if(!el) return;
    el.scrollTop=0;
    requestAnimationFrame(()=>{
      const totalScroll=el.scrollHeight-el.clientHeight;
      if(totalScroll<=0) return;
      const textLen=el.textContent.length;
      const durationMs=Math.min(Math.max(textLen*42,22000),90000);
      const startTime=performance.now();
      function tick(now){
        const p=Math.min((now-startTime)/durationMs,1);
        el.scrollTop=totalScroll*p;
        if(p<1) _retroScrollRAF=requestAnimationFrame(tick);
        else _retroScrollRAF=null;
      }
      _retroScrollRAF=requestAnimationFrame(tick);
    });
  });
}

// ── Bloque 3: personalidad Slack de Luis y Javi ──────────────────────────────
function applySlackPersonality(text){
  if(!text) return text;
  const luisPfx=['¡De arte! ','Pisha, ','Churrita, '];
  const javiPfx=['Ompare! ','Illo! '];
  return text.split('\n').map((line)=>{
    if(/^Luis:/i.test(line)){
      const p=luisPfx[Math.floor(Math.random()*luisPfx.length)];
      return line.replace(/^(Luis:)\s*/i,`$1 ${p}`);
    }
    if(/^Javi(er)?:/i.test(line)){
      const p=javiPfx[Math.floor(Math.random()*javiPfx.length)];
      return line.replace(/^(Javi(?:er)?:)\s*/i,`$1 ${p}`);
    }
    return line;
  }).join('\n');
}

function _renderMd(text){
  if(!text) return '';
  let h=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Fenced code blocks
  h=h.replace(/```([\s\S]*?)```/g,(_,c)=>`<pre style="background:rgba(13,17,23,.8);border:1px solid #30363d;border-radius:6px;padding:.6rem .9rem;font-family:var(--font-mono);font-size:.82rem;overflow-x:auto;margin:.5rem 0;white-space:pre-wrap">${c.trim()}</pre>`);
  // Inline code
  h=h.replace(/`([^`]+)`/g,'<code style="background:rgba(175,184,193,.18);border-radius:4px;padding:.1em .35em;font-family:var(--font-mono);font-size:.88em;color:#e6edf3">$1</code>');
  // ## Headers
  h=h.replace(/^#{1,3}\s+(.+)$/gm,'<div style="font-weight:700;font-size:1.02em;color:#e6edf3;margin-top:1em;margin-bottom:.3em;padding-bottom:.25em;border-bottom:1px solid #21262d">$1</div>');
  // Bold
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong style="color:#e6edf3">$1</strong>');
  // Italic _text_
  h=h.replace(/_(.+?)_/g,'<em>$1</em>');
  // Numbered list items
  h=h.replace(/^\d+\.\s+(.+)$/gm,'<div style="padding:.18em 0 .18em 1.4em;position:relative"><span style="position:absolute;left:.1em;color:#8b949e">•</span>$1</div>');
  // Bullet list items
  h=h.replace(/^[-*]\s+(.+)$/gm,'<div style="padding:.18em 0 .18em 1.4em;position:relative"><span style="position:absolute;left:.1em;color:#8b949e">•</span>$1</div>');
  // Paragraph breaks
  h=h.replace(/\n{2,}/g,'<br><br>');
  h=h.replace(/\n/g,'<br>');
  return h;
}

        const pos=vi===1?1:vi===0?2:3;
        const medal=medals[pos-1];
        const goldCol='#ffd700', silCol='#c0c0c0', bronCol='#cd7f32';
        const col=isFirst?goldCol:pos===2?silCol:bronCol;
        const glowCol=isFirst?'rgba(255,215,0,.6)':pos===2?'rgba(192,192,192,.4)':'rgba(205,127,50,.4)';
        return `<div style="display:flex;flex-direction:column;align-items:center;animation:${isFirst?'champBlast':' podiumFadeIn'} .8s ${delay} both;width:210px">
          <div style="font-size:${isFirst?'4rem':'2.8rem'};animation:${isFirst?'champBounce 1.2s 8s infinite':'none'};line-height:1">${medal}</div>
          <div style="font-size:${isFirst?'1.7rem':'1.25rem'};font-weight:800;font-family:'Syne',sans-serif;color:#e2e8f0;text-align:center;margin:.35rem 0;${isFirst?`text-shadow:0 0 30px ${glowCol}`:''};">${t.teamName}</div>
          <div style="font-family:var(--font-mono);font-size:${isFirst?'1.5rem':'1.15rem'};font-weight:700;color:${col};margin-bottom:.85rem;${isFirst?`text-shadow:0 0 15px ${glowCol}`:''}">${t.score} pts</div>
          <div style="width:100%;height:${h};background:linear-gradient(to top,${isFirst?`rgba(255,215,0,.28),rgba(255,215,0,.07)`:pos===2?'rgba(192,192,192,.2),rgba(192,192,192,.05)':'rgba(205,127,50,.2),rgba(205,127,50,.05)'});border:1px solid ${isFirst?'rgba(255,215,0,.45)':pos===2?'rgba(192,192,192,.3)':'rgba(205,127,50,.3)'};border-bottom:none;border-radius:10px 10px 0 0;animation:podiumRise .7s ${delay} both;display:flex;align-items:center;justify-content:center">
            <span style="font-family:var(--font-mono);font-size:2.8rem;font-weight:800;color:${isFirst?'rgba(255,215,0,.28)':pos===2?'rgba(192,192,192,.22)':'rgba(205,127,50,.22)'}">${pos}</span>
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- Clasificación final completa — aparece a los 8s -->
    ${lb.length?`<div style="z-index:2;width:100%;max-width:720px;margin:0 auto 1rem;animation:fullLbIn .9s 8s both">
      <div style="text-align:center;margin-bottom:1.25rem">
        <div style="display:inline-block;font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:#f5a623;letter-spacing:.05em;text-shadow:0 0 24px rgba(245,166,35,.45)">🏆 CLASIFICACIÓN FINAL</div>
      </div>
      ${lb.map(t=>{
        const m=['🥇','🥈','🥉'];
        const medal=m[t.position-1]||'';
        const isTop=t.position<=3;
        return `<div style="display:grid;grid-template-columns:3.5rem 1fr 7rem;align-items:center;padding:${isTop?'.8rem 1.4rem':'.55rem 1.2rem'};border-radius:12px;background:${isTop?'rgba(255,255,255,.07)':'rgba(255,255,255,.025)'};border:1px solid ${isTop?'rgba(245,166,35,.3)':'rgba(255,255,255,.07)'};margin-bottom:.5rem">
          <span style="font-size:${isTop?'1.7rem':'1.1rem'};text-align:center;line-height:1">${medal||`<span style="font-family:var(--font-mono);color:var(--text-dim);font-size:1rem;font-weight:700">#${t.position}</span>`}</span>
          <span style="font-weight:${isTop?'800':'600'};font-size:${isTop?'1.35rem':'1.05rem'};font-family:${isTop?`'Syne',sans-serif`:'inherit'};padding:0 .5rem">${t.teamName}</span>
          <span style="font-family:var(--font-mono);font-size:${isTop?'1.25rem':'1rem'};color:${isTop?'#f5a623':'var(--text-dim)'};font-weight:700;text-align:right">${t.score}&nbsp;pts</span>
        </div>`;
      }).join('')}
    </div>`:''}
  </div>`;
}

function projFinished(){
  return `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,rgba(34,197,94,.08) 0%,transparent 70%)">
    <div class="text-center" style="max-width:600px;padding:2rem">
      <div style="font-size:4rem;margin-bottom:1rem">🏆</div>
      <h1 style="font-size:3.5rem;font-weight:800;margin-bottom:2rem">¡Dinámica finalizada!</h1>
      <div data-lb class="flex col gap-2" style="max-width:400px;margin:0 auto">${lbHTML()}</div>
    </div>
  </div>`;
}

// TEAM
// ══════════════════════════════════════════════════════
function renderTeam(){
  const s=S.session, stage=s?.currentStage;
  if(!s||s.status==='LOBBY') return teamLobby();
  if(s.status==='FINISHED') return teamFinished();
  if(stage==='RESULTS' && S.quizReveal) return teamQuizReveal();
  if(stage==='RESULTS') return teamResults();
  if(stage==='STAGE_RETRO') return teamRetro();
  if(stage==='STAGE_4') return teamQuiz();
  return teamWaiting(stage);
}

function teamLobby(){
  return `<div class="center-page">
    <div style="max-width:900px;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;align-items:start">
      <div style="display:flex;flex-direction:column;gap:1.5rem">
        <div style="display:flex;justify-content:flex-end"><button class="btn btn-ghost btn-sm" onclick="logout()" style="color:var(--text-dim);font-size:.75rem">← Salir</button></div>
        <div><div style="font-size:2rem;margin-bottom:.5rem"><i class="fa-solid fa-warehouse" style="color:#fff"></i></div>
          <h2 style="font-size:1.5rem;font-weight:800">GÜERJAUS TBT</h2>
        </div>
        <div class="card">
          <div style="font-size:.75rem;color:var(--text-dim)">Equipo</div>
          <div style="font-weight:700;font-size:1.2rem">${S.team?.teamName||S.team?.name}</div>
        </div>
        <div class="card text-center" style="padding:2rem">
          <div class="spinner" style="margin:0 auto 1rem"></div>
          <div style="color:var(--text-dim)">Esperando a que el moderador inicie la sesión...</div>
        </div>
      </div>
      <div class="card"><div class="section-title">Equipos en sala</div>
        <div id="team-list-lobby" class="flex col gap-1" style="margin-top:.5rem">
          ${S.session?.teams?.map(t=>`<div class="lb-row ${t.id===S.team?.id?'my-team':''}">
            <div class="dot-conn ${t.connected?'':'off'}"></div>
            <span>${t.teamName||t.name}${t.id===S.team?.id?' (tú)':''}</span>
          </div>`).join('')||''}
        </div>
      </div>
    </div>
  </div>`;
}

function teamWaiting(stage){
  const showSkip=stage==='STAGE_2_DEBATE'&&!S.skipDone&&!S.skippedByTeam;
  const skipTakenByOther=S.skippedByTeam&&S.skippedByTeam.id!==S.team?.id;
  return `<div style="min-height:100vh;display:flex;flex-direction:column;background:var(--bg)">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:.55rem 1.5rem;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:.6rem">
        <div class="dot-conn"></div>
        <span style="font-weight:700;font-size:.95rem">${S.team?.teamName||S.team?.name}</span>
      </div>
      <div style="display:flex;align-items:center;gap:.6rem">
        ${S.paused?'<span class="badge badge-paused">⏸ PAUSADO</span>':''}
        <button class="btn btn-ghost btn-sm" onclick="logout()" style="color:var(--text-dim);font-size:.72rem;padding:.25rem .65rem">← Salir</button>
      </div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:2.5rem">
      <span class="badge ${stageBadge(stage)}" style="font-size:1.05rem;padding:.55rem 1.75rem;letter-spacing:.08em">${stageLabel(stage)}</span>
      <div style="width:216px;height:216px;display:flex;align-items:center;justify-content:center">
        <div style="transform:scale(1.8);transform-origin:center">${timerHTML(currentTimerTotal())}</div>
      </div>
      <div data-disconnect-banner>${disconnectBannerHTML()}</div>
      <div id="skip-banner"></div>
      ${showSkip?`<div style="max-width:620px;width:100%;background:rgba(245,166,35,.07);border:2px solid var(--accent);border-radius:16px;padding:2rem 2.5rem;text-align:center">
        <div style="font-size:1rem;color:var(--text);margin-bottom:.55rem">¿Tenéis la respuesta? Podéis saltar a la resolución ahora.</div>
        <div style="font-size:.98rem;font-weight:600;margin-bottom:1.5rem">
          <span style="color:var(--accent)">+30% si acertáis</span>
          <span style="color:var(--text-dim);margin:0 .6rem">·</span>
          <span style="color:var(--red)">−50% si falláis</span>
        </div>
        <button class="btn btn-skip" style="font-size:1.1rem;padding:.9rem 2.5rem;width:100%;letter-spacing:.03em" onclick="doSkip()">⚡ ¡TENEMOS LA RESPUESTA! — Adelantar a resolución</button>
      </div>`:''}
      ${skipTakenByOther?`<div style="max-width:480px;width:100%;text-align:center;padding:1rem 1.5rem;border:1px solid var(--accent);border-radius:12px;color:var(--accent)">⚡ <strong>${S.skippedByTeam.name}</strong> ha adelantado — el quiz llegará enseguida</div>`:''}
    </div>
  </div>`;
}

function teamQuiz(){
  const s=S.session, cc=s?.cases[s.currentCaseIndex];
  const isSkipper=S.skippedByTeam?.id===S.team?.id;
  const teamLabel=S.team?.teamName||S.team?.name||'Equipo';
  if(S.answered) return `<div style="min-height:100vh;display:flex;flex-direction:column;background:var(--bg)">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:.55rem 1.5rem;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:.75rem">
        <span style="font-weight:700;font-size:.95rem">${teamLabel}</span>
        <span class="conn-dot ${S.connected?'green':'red'}"></span>
      </div>
      <div style="display:flex;align-items:center;gap:.75rem">
        <span class="badge badge-4" style="font-size:.75rem">⚡ Resolución</span>
        <div style="transform:scale(.65);transform-origin:center right">${timerHTML(currentTimerTotal())}</div>
        <button class="btn" style="font-size:.8rem;padding:.3rem .75rem" onclick="leaveTeam()">Salir</button>
      </div>
    </div>
    <div style="flex:1;display:flex;align-items:center;justify-content:center">
      <div style="text-align:center;color:var(--text-dim);font-size:1.1rem">⏳ Respuesta enviada — esperando resultados</div>
    </div>
  </div>`;
  const titans=cc?.titanAnswerIndices||[];
  return `<div style="min-height:100vh;display:flex;flex-direction:column;background:var(--bg)">
    <!-- topbar -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:.55rem 1.5rem;border-bottom:1px solid var(--border);flex-shrink:0">
      <div style="display:flex;align-items:center;gap:.75rem">
        <span style="font-weight:700;font-size:.95rem">${teamLabel}</span>
        <span class="conn-dot ${S.connected?'green':'red'}"></span>
        ${isSkipper?`<span style="font-size:.72rem;color:var(--accent);background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.35);border-radius:8px;padding:.2rem .55rem">⚡ Adelantado</span>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:.75rem">
        <span class="badge badge-4" style="font-size:.75rem">⚡ Resolución</span>
        <div style="width:78px;height:78px;display:flex;align-items:center;justify-content:center">
          <div style="transform:scale(.65);transform-origin:center">${timerHTML(currentTimerTotal())}</div>
        </div>
        <button class="btn" style="font-size:.8rem;padding:.3rem .75rem" onclick="leaveTeam()">Salir</button>
      </div>
    </div>
    <!-- main -->
    <div style="flex:1;display:flex;flex-direction:column;padding:1rem 1.5rem;gap:.75rem;min-height:0">
      <div data-disconnect-banner>${disconnectBannerHTML()}</div>
      ${S.wildcardUsed?`<div style="font-size:.78rem;color:var(--accent);background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);border-radius:6px;padding:.4rem .75rem;text-align:center">🃏 Comodín activo — solo disponibles las 2 opciones resaltadas</div>`:''}
      <div style="font-size:1rem;font-weight:600;color:var(--text-dim);text-align:center">¿Cuál es la solución?</div>
      <!-- 2×2 answer grid filling remaining height -->
      <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:.75rem;min-height:0">
        ${(()=>{
          return (cc?.answers||[]).map((a,i)=>{
            const isDimmed=S.wildcardUsed&&titans.length&&!titans.includes(i);
            const isSel=S.selectedAnswer===i;
            return `<button class="answer-opt ${isSel?'selected':''} ${isDimmed?'wildcard-dim':''}" onclick="selAns(${i})" ${isDimmed?'disabled':''} style="height:100%;min-height:80px;display:flex;align-items:center;padding:1rem 1.4rem;gap:.85rem;text-align:left;border-radius:10px;${isDimmed?'opacity:.3;pointer-events:none;':''}">
              <span style="font-family:var(--font-mono);font-size:1rem;font-weight:700;color:${isSel?'var(--accent)':'var(--text-dim)'};flex-shrink:0">${String.fromCharCode(65+i)}</span>
              <span style="font-size:.95rem;line-height:1.4">${a}</span>
            </button>`;
          }).join('');
        })()}
      </div>
      <!-- bottom actions -->
      <div style="display:flex;gap:.75rem;flex-shrink:0;padding-top:.25rem">
        ${!S.wildcardUsed?`<button class="btn" style="background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.35);color:var(--accent);font-size:.85rem;flex:1" onclick="useWildcard()">
          🃏 Comodín — reduce puntos 50%
        </button>`:'<div style="flex:1"></div>'}
        <button id="confirm-btn" class="btn btn-primary" style="flex:2;font-size:1rem;padding:.7rem" onclick="submitAns()" ${S.selectedAnswer===null?'disabled':''}>
          Confirmar respuesta →
        </button>
      </div>
    </div>
  </div>`;
}

function teamResults(){
  const lr=S.lastResults, my=lr?.results?.find(r=>r.teamId===S.team?.id);
  const cc=S.session?.cases?.[lr?.caseIndex??S.session?.currentCaseIndex];
  const myAnsText=my?.didAnswer&&my?.answerIndex!==undefined?cc?.answers?.[my.answerIndex]:null;
  const myAnsLabel=my?.answerIndex!==undefined?String.fromCharCode(65+my.answerIndex):'';
  const corrLabel=lr?.correctAnswerIndex!==undefined?String.fromCharCode(65+lr.correctAnswerIndex):'';
  return `<div class="center-page">
    <div style="max-width:900px;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;align-items:start">
      <div style="display:flex;flex-direction:column;gap:1.5rem">
        <h2 style="font-size:1.3rem;font-weight:700">Resultados del caso</h2>
        ${my?`<div class="result-card ${my.isCorrect?'ok':'fail'}" style="padding:1.5rem;flex-direction:column;text-align:center;gap:.5rem">
          <div style="font-size:2rem">${my.isCorrect?'✅':'❌'}</div>
          <div style="font-weight:700;font-size:1.1rem">${my.isCorrect?'¡Correcto!':'Incorrecto'}</div>
          ${my.isSkipper?`<div style="font-size:.85rem;color:var(--text-dim)">${my.isCorrect?'Bonus por adelantar +30%':'Penalización −50%'}</div>`:''}
          ${my.isCorrect&&my.speedBonus>0?`<div style="font-size:.82rem;color:var(--accent);font-family:var(--font-mono)">${['🥇','🥈','🥉'][(my.speedPosition||1)-1]||''} +${my.speedBonus} pts por respuesta rápida</div>`:''}
          <div class="result-pts ${my.pointsEarned>=0?'pos':'neg'}" style="font-size:1.5rem">${my.pointsEarned>=0?'+':''}${my.pointsEarned} pts</div>
        </div>`:''}
        <div class="card card-sm" style="display:flex;flex-direction:column;gap:.6rem">
          ${myAnsText?`<div style="display:flex;gap:.5rem;align-items:flex-start">
            <span style="font-size:.72rem;color:var(--text-dim);white-space:nowrap;padding-top:.15rem">Vuestra respuesta</span>
            <span style="font-weight:600;color:${my?.isCorrect?'var(--green)':'var(--red)'}">${myAnsLabel}: ${myAnsText}</span>
          </div>`:''}
          <div style="display:flex;gap:.5rem;align-items:flex-start">
            <span style="font-size:.72rem;color:var(--text-dim);white-space:nowrap;padding-top:.15rem">Respuesta correcta</span>
            <span style="font-weight:700;color:var(--green)">${corrLabel}: ${lr?.correctAnswerText||''}</span>
          </div>
        </div>
        <div data-disconnect-banner>${disconnectBannerHTML()}</div>
        <div style="color:var(--text-dim);font-size:.85rem">Esperando al siguiente caso...</div>
      </div>
    </div>
  </div>`;
}

function teamRetro(){
  const cc=S.session?.cases?.[S.session?.currentCaseIndex];
  if(!cc) return `<div class="center-page"><div class="spinner"></div></div>`;
  const sub=S.retroSubstep||0;
  const r=cc.retro||{};
  const corrLabel=String.fromCharCode(65+(cc.correctAnswerIndex||0));
  const wrongIdx=[0,1,2,3].find(i=>i!==cc.correctAnswerIndex)??0;
  const wrongLabel=String.fromCharCode(65+wrongIdx);
  const h=cc.hoursImputed??'?';
  const steps=[
    {i:0,lbl:'🔍 Tarea'},
    {i:1,lbl:'💬 Debate'},
    {i:2,lbl:'🎓 Lección'},
  ];
  // Sub 2: full-screen moraleja
  if(sub>=2) return `<div class="center-page" style="background:radial-gradient(ellipse at 50% 30%,rgba(139,92,246,.15) 0%,transparent 70%)">
    <div style="max-width:440px;width:100%;text-align:center;padding:1.5rem;animation:fadeSlideIn .7s ease">
      <div style="font-size:.65rem;text-transform:uppercase;letter-spacing:.2em;color:#c4b5fd;margin-bottom:1.5rem">🎓 Lección del caso</div>
      <div style="font-size:1.4rem;color:rgba(139,92,246,.5)">"</div>
      <div style="font-size:1.05rem;font-weight:600;line-height:1.6;font-style:italic;color:#e2e8f0;padding:.5rem 0">${cc.moraleja||''}</div>
      <div style="font-size:1.4rem;color:rgba(139,92,246,.5)">"</div>
      <div style="font-size:.75rem;color:var(--text-dim);margin-top:1rem">— ${cc.title}</div>
    </div>
  </div>`;
  // Sub 0-2: progressive reveal
  return `<div class="center-page">
    <div style="max-width:900px;width:100%;display:flex;flex-direction:column;gap:.75rem;padding:1rem">
      <div style="display:flex;gap:.35rem;justify-content:center;flex-wrap:wrap">
        ${steps.map(({i,lbl})=>`<div style="padding:.2rem .55rem;border-radius:12px;font-size:.68rem;transition:.3s;${i<=sub?'background:rgba(139,92,246,.25);color:#c4b5fd;border:1px solid rgba(139,92,246,.4)':'background:var(--surface2);color:var(--text-dim);border:1px solid var(--border)'}">${lbl}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:${sub>=1?'1fr 1fr':'1fr'};gap:1rem;align-items:start">
        <div class="card" style="border-color:rgba(139,92,246,.3);background:rgba(139,92,246,.04);padding:.75rem;animation:fadeSlideIn .5s ease">
          <div style="font-size:.62rem;color:#c4b5fd;margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.1em">🔍 La tarea real</div>
          <div style="font-family:var(--font-mono);font-size:.68rem;color:#8b949e;margin-bottom:.3rem">git.factorlibre.com / ${(r.glProjectPath||r.gitlabProject||'—').split('/').pop()}${r.gitlabIssueNumber?` #${r.gitlabIssueNumber}`:''}</div>
          <div style="font-weight:700;font-size:.92rem;line-height:1.3;margin-bottom:.5rem">${r.glTitle||cc.title}</div>
          <div style="font-size:.78rem;color:var(--green)">✅ Solución: Opción ${corrLabel}</div>
          <div style="font-size:.78rem;color:var(--text-dim);margin-top:.15rem">${cc.answers?.[cc.correctAnswerIndex]||''}</div>
          <div style="margin-top:.6rem;padding-top:.6rem;border-top:1px solid var(--border);display:flex;align-items:baseline;gap:.4rem">
            <span style="font-family:var(--font-mono);font-size:1.6rem;font-weight:800;color:var(--accent)">${h}</span>
            <span style="font-size:.72rem;color:var(--text-dim)">horas imputadas${typeof h==='number'?' · ≈'+Math.round(h/8)+' días':''}</span>
          </div>
        </div>
        ${sub>=1?`<div class="card" style="border-color:rgba(139,92,246,.3);background:rgba(139,92,246,.04);padding:.75rem;animation:fadeSlideIn .5s ease">
          <div style="font-size:.62rem;color:#c4b5fd;margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.1em">💬 La Pregunta / ⚡ El Desafío</div>
          <div style="font-size:.82rem;line-height:1.5">${(cc.debatePregunta||'').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')}${cc.debateDesafio?`<br><span style="color:#c4b5fd;font-weight:700">⚡ El Desafío:</span> ${cc.debateDesafio.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')}`:''}</div>
        </div>`:''}
      </div>
      <div style="text-align:center;color:var(--text-dim);font-size:.72rem;padding:.3rem">Moderador controlando el ritmo...</div>
    </div>
  </div>`;
}

function teamQuizReveal(){
  const s=S.session, cc=s?.cases[s.currentCaseIndex];
  const qr=S.quizReveal, my=qr?.myResult;
  const isCorrect=my?.isCorrect;
  const isSkipper=my?.isSkipper;
  return `<div class="center-page">
    <div style="max-width:900px;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;align-items:start">
      <div style="display:flex;flex-direction:column;gap:1.5rem">
        <div class="flex justify-between items-center">
          <div style="font-weight:700">${S.team?.teamName||S.team?.name}</div>
          <span class="badge badge-ok">✅ Solución</span>
        </div>
        <div class="card text-center" style="padding:1.5rem;border-color:${isCorrect?'var(--green)':'var(--red)'};background:${isCorrect?'rgba(34,197,94,.08)':'rgba(239,68,68,.08)'}">
          <div style="font-size:2.5rem;margin-bottom:.4rem">${isCorrect?'🎉':'😬'}</div>
          <div style="font-weight:800;font-size:1.3rem;color:${isCorrect?'var(--green)':'var(--red)'}">${isCorrect?'¡CORRECTO!':'¡INCORRECTO!'}</div>
          ${isSkipper?`<div style="font-size:.85rem;color:var(--text-dim);margin-top:.3rem">${isCorrect?'Bonus por adelantar +30%':'Penalización −50%'}</div>`:''}
          ${isCorrect&&my?.speedBonus>0?`<div style="font-size:.82rem;color:var(--accent);font-family:var(--font-mono);margin-top:.2rem">${['🥇','🥈','🥉'][(my.speedPosition||1)-1]||''} +${my.speedBonus} pts por respuesta rápida</div>`:''}
          ${my?.pointsEarned!==undefined?`<div style="font-family:var(--font-mono);font-size:1.4rem;font-weight:700;margin-top:.4rem;color:${my.pointsEarned>=0?'var(--green)':'var(--red)'}">${my.pointsEarned>=0?'+':''}${my.pointsEarned} pts</div>`:''}
        </div>
      </div>
      <div>
        <div class="card"><div class="section-title" style="margin-bottom:1rem">La solución era...</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
            ${cc?.answers?.map((a,i)=>`<button class="answer-opt ${i===qr.correctIndex?'reveal-correct':'reveal-wrong'}" disabled>
              <span style="font-family:var(--font-mono);font-size:.72rem;margin-right:.5rem">${String.fromCharCode(65+i)}</span>${a}
            </button>`).join('')||''}
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function teamFinished(){
  return `<div class="center-page">
    <div style="max-width:460px;width:100%;text-align:center;display:flex;flex-direction:column;gap:1.5rem">
      <div style="font-size:3rem">⏳</div>
      <h2 style="font-size:1.5rem;font-weight:800">¡Dinámica finalizada!</h2>
      <div style="color:var(--text-dim)">En breve el moderador revelará los resultados...</div>
    </div>
  </div>`;
}

function doSkip(){
  if(S.skipDone||S.skippedByTeam) return;
  if(S.ws?.readyState!==1){toast('Sin conexión al servidor','error');return;}
  S.skipDone=true;
  S.ws.send(JSON.stringify({type:'TEAM_SKIP',payload:{timestamp:Date.now()}}));
  render();
}
function selAns(i){
  if(S.answered)return;
  if(S.wildcardUsed){
    const titans=S.session?.cases?.[S.session?.currentCaseIndex]?.titanAnswerIndices||[];
    if(titans.length&&!titans.includes(i)){toast('Esta opción está bloqueada por el comodín','info');return;}
  }
  _playSelectSound();
  S.selectedAnswer=i;
  document.querySelectorAll('.answer-opt').forEach((el,idx)=>el.classList.toggle('selected',idx===i));
  const btn=$('confirm-btn');if(btn)btn.removeAttribute('disabled');
}
function useWildcard(){
  if(S.wildcardUsed||S.answered)return;
  const cc=S.session?.cases?.[S.session?.currentCaseIndex];
  const titans=cc?.titanAnswerIndices||[];
  if(S.selectedAnswer!==null&&titans.length&&!titans.includes(S.selectedAnswer)){
    S.selectedAnswer=null;
  }
  S.wildcardUsed=true;
  send({type:'TEAM_WILDCARD'});
  render();
}
function submitAns(){
  if(S.answered||S.selectedAnswer===null)return;
  _playConfirmSound();
  S.answered=true;
  send({type:'TEAM_ANSWER',payload:{answerIndex:S.selectedAnswer,timestamp:Date.now()}});
  render();
}

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function render(){
  const root=$('root');
  if(S.view==='HOME')      root.innerHTML=renderHome();
  else if(S.view==='WAITING')   root.innerHTML=renderWaiting();
  else if(S.view==='ADMIN')     root.innerHTML=renderAdmin();
  else if(S.view==='TEAM')      root.innerHTML=renderTeam();
  else if(S.view==='PROJECTOR') root.innerHTML=renderProjector();
  // Timer fijo proyector: renderizado directo en body, fuera de cualquier contenedor
updateTimerUI();
  refreshLeaderboards();
  refreshDisconnectBanner();
  // Slack animation: trigger after DOM update for STAGE_1 projector
  if(S.role==='projector' && S.session?.currentStage==='STAGE_1'){
    const idx=S.session.currentCaseIndex;
    requestAnimationFrame(()=>_runSlackAnim(idx));
  }
  if(S.role==='projector' && S.session?.currentStage==='STAGE_2'){
    const idx=S.session.currentCaseIndex;
    requestAnimationFrame(()=>_runGitlabAnim(idx));
  }
  if(S.role==='projector' && S.session?.currentStage==='STAGE_3'){
    const idx=S.session.currentCaseIndex;
    requestAnimationFrame(()=>_runStage3Anim(idx));
  }
  // Tema de color por vista
  const r=document.documentElement;
  if(S.view==='TEAM'){
    const c=S.teamColor||'#f5a623';
    r.style.setProperty('--accent',c);
    r.style.setProperty('--accent-dim',c+'33');
    // Fondo suave para la tarjeta "mi equipo" en el leaderboard
    const hx=c.replace('#','');
    const tr=parseInt(hx.substring(0,2),16),tg=parseInt(hx.substring(2,4),16),tb=parseInt(hx.substring(4,6),16);
    r.style.setProperty('--my-team-bg',`rgba(${tr},${tg},${tb},0.12)`);
  } else if(S.view==='PROJECTOR'){
    r.style.setProperty('--accent','#3b82f6');
    r.style.setProperty('--accent-dim','#3b82f633');
  } else {
    r.style.setProperty('--accent','#f5a623');
    r.style.setProperty('--accent-dim','#f5a62333');
  }
  // View badge (solo admin)
  const badge=$('view-badge');
  if(badge){
    badge.textContent=S.view==='ADMIN'?'🔧 Admin':'';
    badge.style.display=S.view==='ADMIN'?'block':'none';
  }
  // Hide countdown if not active
  if(!_cdTimer && _cdValue<=0){
    const ov=$('countdown-overlay');if(ov)ov.style.display='none';
  }
}

// Restaurar estado y reconectar
(function(){
  fetchPublicSessions(); // poblar dropdown de sesiones en el login
  const hadState=restoreState(); // carga S desde localStorage (UI instantánea)
  const saved=loadCreds();
  if(saved){
    _isReconnecting=!!hadState; // si había estado previo, es reconexión
    connectWS(buildLoginMsg(saved));
  }
})();

render();
</script>

</html>
