<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GÜERJAUS TBT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
:root {
  --bg:#0a0e1a; --surface:#111827; --surface2:#1c2537; --border:#2a3650;
  --accent:#f5a623; --accent2:#e85d4a; --green:#22c55e; --blue:#3b82f6;
  --purple:#8b5cf6; --text:#e8edf5; --text-dim:#6b7a99; --red:#ef4444;
  --font-mono:'Space Mono',monospace; --font:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.admin-layout{display:grid;grid-template-columns:260px 1fr;height:100vh;overflow:hidden}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:1.5rem;gap:.4rem}
.main{overflow-y:auto;padding:2rem}
.center-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}

.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem}
.card-sm{padding:1rem 1.25rem}
.card-accent{border-color:var(--accent);box-shadow:0 0 20px rgba(245,166,35,.1)}

.btn{font-family:var(--font);font-weight:700;font-size:.9rem;padding:.65rem 1.4rem;border-radius:8px;border:none;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:.4rem}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#000}.btn-primary:hover:not(:disabled){background:#fbbf24;transform:translateY(-1px)}
.btn-danger{background:var(--accent2);color:#fff}.btn-danger:hover:not(:disabled){background:#f87171}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border)}.btn-ghost:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.btn-green{background:var(--green);color:#000}.btn-green:hover:not(:disabled){background:#4ade80}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover:not(:disabled){background:#60a5fa}
.btn-pause{background:rgba(245,166,35,.15);color:var(--accent);border:1px solid var(--accent)}.btn-pause:hover:not(:disabled){background:rgba(245,166,35,.28)}
.btn-resume{background:var(--green);color:#000}.btn-resume:hover:not(:disabled){background:#4ade80}
.btn-sm{padding:.4rem .9rem;font-size:.8rem}
.btn-lg{padding:1rem 2rem;font-size:1.1rem}
.btn-xl{padding:1.25rem 2.5rem;font-size:1.2rem}
.btn-skip{background:linear-gradient(135deg,#f5a623,#e85d4a);color:#fff;padding:1rem 2rem;border-radius:12px;box-shadow:0 0 30px rgba(245,166,35,.5);animation:pulse-skip 1.5s ease-in-out infinite;width:100%;justify-content:center;font-size:1.05rem}
@keyframes pulse-skip{0%,100%{box-shadow:0 0 20px rgba(245,166,35,.4)}50%{box-shadow:0 0 44px rgba(245,166,35,.85)}}
.w-full{width:100%}

input,textarea,select{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:.9rem;padding:.65rem 1rem;border-radius:8px;width:100%;transition:border-color .15s;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
.md-editor-wrap{display:flex;flex-direction:column}
.md-editor-tabs{display:flex;gap:0;margin-bottom:-1px;position:relative;z-index:1}
.md-tab{padding:.2rem .65rem;font-size:.75rem;background:transparent;border:1px solid transparent;border-bottom:none;border-radius:6px 6px 0 0;color:var(--text-dim);cursor:pointer;font-family:var(--font);transition:color .15s}
.md-tab.md-tab-on{background:var(--surface2);border-color:var(--border);color:var(--text)}
.md-editor-wrap textarea{border-radius:0 6px 6px 6px}
.md-preview-pane{background:var(--surface2);border:1px solid var(--border);border-radius:0 6px 6px 6px;padding:.6rem .9rem;font-size:.88rem;line-height:1.65;color:var(--text)}
label{font-size:.75rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3rem;display:block}

.logo{font-family:var(--font-mono);font-size:.75rem;font-weight:700;color:var(--accent);letter-spacing:.1em;padding-bottom:1rem;border-bottom:1px solid var(--border);margin-bottom:.5rem}
.nav-item{padding:.6rem 1rem;border-radius:8px;cursor:pointer;font-size:.88rem;color:var(--text-dim);transition:all .15s;display:flex;align-items:center;gap:.6rem}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(245,166,35,.15);color:var(--accent)}

.timer-ring{position:relative;width:120px;height:120px;flex-shrink:0}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring .track{fill:none;stroke:var(--surface2);stroke-width:8}
.timer-ring .progress{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .5s linear,stroke .5s}
.timer-ring .label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--font-mono)}
.timer-ring .time-text{font-size:1.4rem;font-weight:700}
@keyframes timerUrgent{0%,100%{opacity:1}50%{opacity:.2}}
.timer-urgent .progress{animation:timerUrgent 1s ease-in-out infinite}
.timer-urgent .time-text{animation:timerUrgent 1s ease-in-out infinite;color:#ef4444}
.timer-ring .status-text{font-size:.55rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em}
.badge{display:inline-flex;align-items:center;gap:.4rem;padding:.3rem .9rem;border-radius:999px;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.badge-1{background:rgba(59,130,246,.2);color:var(--blue);border:1px solid rgba(59,130,246,.4)}
.badge-2{background:rgba(245,166,35,.2);color:var(--accent);border:1px solid rgba(245,166,35,.4)}
.badge-3{background:rgba(139,92,246,.2);color:var(--purple);border:1px solid rgba(139,92,246,.4)}
.badge-4{background:rgba(232,93,74,.2);color:var(--accent2);border:1px solid rgba(232,93,74,.4)}
.badge-ok{background:rgba(34,197,94,.2);color:var(--green);border:1px solid rgba(34,197,94,.4)}
.badge-gray{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border)}
.badge-retro{background:rgba(139,92,246,.2);color:#c4b5fd;border:1px solid rgba(139,92,246,.4)}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.badge-paused{background:rgba(245,166,35,.2);color:var(--accent);border:1px solid var(--accent);animation:blink-b 1s ease-in-out infinite}
@keyframes blink-b{0%,100%{opacity:1}50%{opacity:.45}}

.lb-row{display:flex;align-items:center;gap:1rem;padding:.75rem 1rem;border-radius:8px;border:1px solid var(--border);background:var(--surface2)}
.lb-row.my-team{border-color:var(--accent);background:var(--my-team-bg,rgba(245,166,35,.08))}
.lb-row.pos-1{border-color:#fbbf24;background:rgba(251,191,36,.08)}
.rank{font-family:var(--font-mono);font-size:1.1rem;font-weight:700;width:2rem;text-align:center}
.rank.gold{color:#fbbf24}.rank.silver{color:#9ca3af}.rank.bronze{color:#b45309}
.score-val{font-family:var(--font-mono);font-weight:700;color:var(--accent);margin-left:auto}

.answer-opt{padding:1.1rem 1.4rem;border-radius:10px;border:2px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .15s;font-size:.95rem;line-height:1.5;text-align:left;font-family:var(--font);color:var(--text);width:100%}
.answer-opt:hover:not(:disabled){border-color:var(--accent);background:rgba(245,166,35,.08)}
.answer-opt.selected{border-color:var(--blue);background:rgba(59,130,246,.12)}
.answer-opt.correct{border-color:var(--green);background:rgba(34,197,94,.15);color:var(--green)}
.answer-opt.wrong{border-color:var(--red);background:rgba(239,68,68,.1);color:var(--red)}
/* Quiz reveal — estilo "¿Quién quiere ser millonario?" */
.answer-opt.reveal-correct{border-color:var(--green)!important;background:rgba(34,197,94,.22)!important;color:var(--green)!important;animation:pulseCorrect .7s ease forwards;cursor:default}
.answer-opt.reveal-wrong{opacity:.3;border-color:rgba(239,68,68,.3)!important;background:rgba(239,68,68,.05)!important;color:rgba(239,68,68,.6)!important;cursor:default}
.proj-quiz-card{padding:1.25rem;border-radius:10px;border:2px solid var(--border);background:var(--surface2);font-size:.95rem;line-height:1.5;transition:all .4s ease}
.proj-quiz-card.reveal-correct{border-color:var(--green)!important;background:rgba(34,197,94,.2)!important;color:var(--green)!important;animation:pulseCorrect .7s ease forwards;box-shadow:0 0 28px rgba(34,197,94,.35)}
.proj-quiz-card.reveal-wrong{opacity:.28;border-color:rgba(239,68,68,.25)!important;background:rgba(239,68,68,.04)!important}
@keyframes pulseCorrect{0%{transform:scale(1)}40%{transform:scale(1.03);box-shadow:0 0 32px rgba(34,197,94,.5)}100%{transform:scale(1);box-shadow:0 0 14px rgba(34,197,94,.3)}}
@keyframes cdPulse{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
#countdown-overlay .cd-num{animation:cdPulse .25s ease-out!important}

.dot-conn{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 2s ease-in-out infinite;flex-shrink:0}
.dot-conn.off{background:var(--red);animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
/* View badge */
#view-badge{position:fixed;top:.6rem;right:.8rem;font-size:.65rem;font-family:var(--font-mono);color:var(--text-dim);background:rgba(10,14,26,.8);border:1px solid var(--border);border-radius:6px;padding:.15rem .5rem;z-index:900;display:none;letter-spacing:.05em;pointer-events:none}
/* Countdown overlay */
#countdown-overlay{position:fixed;inset:0;background:rgba(10,14,26,.93);display:none;align-items:center;justify-content:center;flex-direction:column;gap:1rem;z-index:1000}
#countdown-overlay .cd-label{font-size:1.4rem;font-weight:700;color:var(--text);animation:blink-b 1s ease-in-out infinite}
#countdown-overlay .cd-num{font-size:8rem;font-weight:800;font-family:var(--font-mono);color:var(--accent);line-height:1;animation:blink-b .8s ease-in-out infinite}
#countdown-overlay .cd-go{font-size:5rem;font-weight:800;color:var(--green);animation:blink .3s step-start infinite}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.section-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-dim);margin-bottom:.75rem}

.flex{display:flex}.col{flex-direction:column}.gap-1{gap:.5rem}.gap-2{gap:1rem}.gap-3{gap:1.5rem}
.items-center{align-items:center}.justify-center{justify-content:center}.justify-between{justify-content:space-between}
.text-center{text-align:center}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}

.progress-dots{display:flex;gap:.4rem}
.pdot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:all .3s}
.pdot.done{background:var(--green)}.pdot.active{background:var(--accent);transform:scale(1.3)}
.answers-bar{background:var(--surface2);border-radius:999px;height:6px;overflow:hidden}
.answers-bar-fill{height:100%;background:var(--accent);border-radius:999px;transition:width .3s}
.result-card{padding:1rem 1.25rem;border-radius:10px;border:1px solid var(--border);display:flex;align-items:center;gap:1rem;font-size:.9rem}
.result-card.ok{border-color:var(--green);background:rgba(34,197,94,.08)}
.result-card.fail{border-color:var(--red);background:rgba(239,68,68,.08)}
.result-pts{font-family:var(--font-mono);font-weight:700;font-size:1.1rem;margin-left:auto}
.result-pts.pos{color:var(--green)}.result-pts.neg{color:var(--red)}
.user-row{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:8px;border:1px solid var(--border);background:var(--surface2);margin-bottom:.5rem}
.role-badge{padding:.2rem .6rem;border-radius:999px;font-size:.7rem;font-weight:700}
.role-admin{background:rgba(245,166,35,.2);color:var(--accent);border:1px solid rgba(245,166,35,.4)}
.role-user{background:rgba(59,130,246,.2);color:var(--blue);border:1px solid rgba(59,130,246,.4)}

#toast{position:fixed;bottom:2rem;right:2rem;padding:.8rem 1.4rem;border-radius:10px;font-size:.9rem;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}
#toast.success{background:var(--green);color:#000}
#toast.error{background:var(--accent2);color:#fff}
#toast.info{background:var(--blue);color:#fff}
#toast.wildcard{background:rgba(245,166,35,.95);color:#000;font-size:.95rem}

.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}

.proj-body{min-height:100vh;background:var(--bg);display:flex;flex-direction:column}
.proj-header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
.proj-area{flex:1;display:flex;padding:2rem;gap:2rem}
.proj-content{flex:1;display:flex;flex-direction:column;gap:1.5rem}
.proj-sidebar{width:300px;display:flex;flex-direction:column;gap:1rem;position:sticky;top:1rem;align-self:flex-start}
.ctx-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;flex:1;overflow-y:auto;font-size:1rem;line-height:1.7}
.ctx-box h3{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-dim);margin-bottom:.75rem}
.clue-box{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.4);border-radius:12px;padding:1.5rem}

/* ── Slack simulation ── */
.slack-sim{background:#1a1d21;border-radius:12px;flex:1;display:flex;flex-direction:column;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;min-height:0}
.slack-sim-header{background:#19171d;border-bottom:1px solid #332f38;padding:.75rem 1.25rem;display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.slack-hash{color:#ababad;font-size:1.1rem;font-weight:800}
.slack-ch-name{color:#fff;font-weight:700;font-size:1rem}
.slack-ch-desc{color:#ababad;font-size:.8rem}
.slack-msgs{flex:1;overflow-y:auto;padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:.1rem;scroll-behavior:smooth}
.slack-msg{display:flex;gap:.75rem;align-items:flex-start;opacity:0;transform:translateY(6px);padding:.35rem .5rem;border-radius:6px;transition:background .15s}
.slack-msg.visible{animation:slack-pop .3s ease-out forwards}
.slack-msg:hover{background:rgba(255,255,255,.04)}
@keyframes slack-pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.slack-avatar{width:42px;height:42px;border-radius:6px;background:linear-gradient(135deg,#e01563,#4a154b);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.8rem;flex-shrink:0;margin-top:2px;letter-spacing:.05em}
.slack-avatar.sm-urgent{background:linear-gradient(135deg,#c0392b,#7b0000)}
.slack-msg-body{flex:1;min-width:0}
.slack-msg-meta{display:flex;align-items:baseline;gap:.5rem;margin-bottom:.25rem}
.slack-author{font-weight:700;font-size:1rem;color:#fff}
.slack-time{font-size:.8rem;color:#696969}
.slack-msg-text{color:#d1d2d3;font-size:1.1rem;line-height:1.6}
.slack-msg-text strong{color:#fff}
.slack-impact-box{background:rgba(200,30,30,.1);border-left:3px solid #c0392b;padding:.7rem 1rem;border-radius:0 6px 6px 0;margin-top:.25rem;color:#ffaaaa;font-size:1.05rem}
.slack-impact-box strong{color:#ff7070}
.slack-mention{color:#5d9bff;background:rgba(93,155,255,.12);border-radius:3px;padding:.05rem .3rem;cursor:pointer;font-weight:600}
.slack-typing-row{display:none;align-items:center;gap:.6rem;padding:.3rem .5rem;opacity:.7}
.slack-typing-row.show{display:flex}
.slack-typing-dots{display:flex;gap:4px;align-items:center}
.slack-typing-dots span{width:8px;height:8px;border-radius:50%;background:#ababad;animation:typing-b .9s infinite ease-in-out}
.slack-typing-dots span:nth-child(2){animation-delay:.18s}
.slack-typing-dots span:nth-child(3){animation-delay:.36s}
@keyframes typing-b{0%,60%,100%{transform:translateY(0);opacity:.6}30%{transform:translateY(-4px);opacity:1}}
.slack-typing-label{font-size:.88rem;color:#ababad}
.slack-debate-banner{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);border-radius:8px;padding:.65rem 1rem;text-align:center;color:var(--accent);font-size:.95rem;margin:.75rem 1.5rem .25rem;flex-shrink:0}

/* ── GitLab issue format (STAGE_2) ── */
.gl-wrap{background:#0d1117;border-radius:12px;flex:1;display:flex;flex-direction:column;overflow:hidden;font-family:-apple-system,'Segoe UI',system-ui,sans-serif;min-height:0}
.gl-topbar{background:#1f2329;border-bottom:1px solid #30363d;padding:.45rem 1rem;display:flex;align-items:center;gap:.55rem;flex-shrink:0}
.gl-topbar-logo{display:flex;align-items:center;gap:.45rem;font-size:.85rem;font-weight:700;color:#e6edf3;letter-spacing:.02em}
.gl-issue-head{background:#161b22;border-bottom:1px solid #30363d;padding:1rem 1.25rem;flex-shrink:0}
.gl-issue-title{font-size:1.4rem;font-weight:700;color:#e6edf3;margin-bottom:.5rem;line-height:1.3}
.gl-issue-meta{font-size:.82rem;color:#8b949e;display:flex;gap:.55rem;align-items:center;flex-wrap:wrap}
.gl-label{padding:.2rem .65rem;border-radius:10px;font-size:.75rem;font-weight:600;letter-spacing:.04em}
.gl-label-bug{background:rgba(239,68,68,.2);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
.gl-label-ops{background:rgba(245,166,35,.15);color:#fcd34d;border:1px solid rgba(245,166,35,.25)}
.gl-label-urgent{background:rgba(239,68,68,.3);color:#ff8080;border:1px solid rgba(239,68,68,.5)}
.gl-label-expedite{background:rgba(239,68,68,.25);color:#fca5a5;border:1px solid rgba(239,68,68,.45)}
.gl-label-almacen{background:rgba(245,166,35,.2);color:#fcd34d;border:1px solid rgba(245,166,35,.35)}
.gl-label-mante{background:rgba(59,130,246,.2);color:#93c5fd;border:1px solid rgba(59,130,246,.35)}
.gl-label-desa{background:rgba(139,92,246,.2);color:#c4b5fd;border:1px solid rgba(139,92,246,.35)}
.gl-thread{flex:1;overflow-y:auto;padding:.65rem 1.25rem;display:flex;flex-direction:column;gap:.65rem}
.gl-comment{display:flex;gap:.75rem;align-items:flex-start;opacity:0;transform:translateY(8px);transition:opacity .35s,transform .35s}
.gl-comment.visible{opacity:1;transform:none}
.gl-avatar{width:2.4rem;height:2.4rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0;color:#fff;margin-top:1px}
.gl-comment-box{background:#161b22;border:1px solid #30363d;border-radius:8px;flex:1;overflow:hidden}
.gl-comment-hdr{padding:.38rem .8rem;border-bottom:1px solid #21262d;background:#1c2128;display:flex;align-items:center;gap:.5rem;font-size:.82rem;color:#8b949e}
.gl-comment-author{color:#e6edf3;font-weight:600}
.gl-comment-body{padding:.75rem .85rem;color:#c9d1d9;font-size:1.05rem;line-height:1.7}
.gl-role-badge{padding:.12rem .45rem;border-radius:4px;font-size:.7rem;font-weight:600}
.gl-role-dev{background:rgba(99,102,241,.2);color:#a5b4fc}
.gl-role-fun{background:rgba(34,197,94,.15);color:#86efac}
.gl-role-boss{background:rgba(14,165,233,.2);color:#7dd3fc}
.gl-typing-row{display:none;align-items:center;gap:.6rem;padding:.25rem .5rem}
.gl-typing-row.show{display:flex}

@media(max-width:768px){.admin-layout{grid-template-columns:1fr}.sidebar{display:none}.proj-area{flex-direction:column}.proj-sidebar{width:100%}}

.reconnect-overlay{position:fixed;inset:0;background:rgba(10,14,26,.93);z-index:5000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;text-align:center;padding:2rem}
.reconnect-overlay h3{color:var(--accent);font-size:1.3rem;font-weight:700}
.reconnect-overlay p{color:var(--text-dim);font-size:.9rem}
.login-hint{font-size:.75rem;color:var(--text-dim);padding:.4rem .75rem;border-radius:6px;background:var(--surface2);border:1px solid var(--border);text-align:left;line-height:1.6}
.login-hint strong{color:var(--text)}
.field-row{display:flex;flex-direction:column;gap:.3rem}
/* ── Podio ──────────────────────────────────────────────────────────── */
@keyframes suspenseText{0%,100%{opacity:1;text-shadow:0 0 40px rgba(245,166,35,.8)}50%{opacity:.3;text-shadow:none}}
@keyframes smokeRise{0%{transform:translateY(0) scale(1);opacity:.18}100%{transform:translateY(-120px) scale(2.2);opacity:0}}
@keyframes podiumRise{from{transform:scaleY(0);opacity:0;transform-origin:bottom}to{transform:scaleY(1);opacity:1;transform-origin:bottom}}
@keyframes podiumFadeIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes champBounce{0%,100%{transform:scale(1)}30%{transform:scale(1.12)}60%{transform:scale(.95)}}
@keyframes fullLbIn{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes goldFlash{0%{opacity:0}18%{opacity:1}100%{opacity:0}}
@keyframes champBlast{0%{opacity:0;transform:scale(0) rotate(-8deg)}55%{transform:scale(1.22) rotate(3deg);opacity:1}75%{transform:scale(.93)}90%{transform:scale(1.06)}100%{opacity:1;transform:scale(1)}}
@keyframes winnerBoom{0%{opacity:0;transform:scale(.4)}25%{opacity:1;transform:scale(1.08)}45%{transform:scale(.97)}65%{opacity:1;transform:scale(1)}82%{opacity:1}100%{opacity:0;transform:scale(1.05)}}
@keyframes crownSpin{0%{transform:rotate(-20deg) scale(0)}40%{transform:rotate(10deg) scale(1.3)}70%{transform:rotate(-5deg) scale(.95)}100%{transform:rotate(0deg) scale(1)}}
@keyframes reactionPop{0%{transform:scale(0);opacity:0}55%{transform:scale(1.18)}80%{transform:scale(.96)}100%{transform:scale(1);opacity:1}}
@keyframes reactionBounce{0%,100%{transform:scale(1)}40%{transform:scale(1.2)}}
.react-pop{animation:reactionPop .28s ease-out forwards}
.react-bounce{animation:reactionBounce .2s ease-out forwards}
</style>
</head>
<body>
<div id="root"></div>
<div id="view-badge"></div>
<div id="countdown-overlay">
  <div class="cd-label" id="cd-label"></div>
  <div id="cd-num-wrap"></div>
</div>
<div id="toast"></div>
<div id="modal-root"></div>

<script>
// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
const S = {
  view:'HOME', ws:null, session:null, team:null, admin:null,
  role:null, roomCode:null,
  timerRemaining:0, timerEnd:null, paused:false,
  adminTab:'sesiones', adminSubTab:'personas', editingCase:null,
  leaderboard:[], lastResults:null,
  answered:false, selectedAnswer:null, skipDone:false,
  skippedByTeam:null, answeredCount:0, quizReveal:null,
  users:{ people:[], teams:[] }, allSessions:[],
  library:[],           // biblioteca global de casos (independiente de sesiones)
  podiumMode:null,      // null | 'suspense' | 'reveal' — estado de la pantalla de podio en proyector
  adminPodiumOpen:false,// true cuando el admin tiene abierta la vista de podio
  awaitingReconnect:[], // keys de clientes desconectados pendientes de reconexión
  waitingMsg:'',        // mensaje cuando no hay sesión activa
  teamColor:'#f5a623',  // color de acento del equipo (se aplica en vista TEAM)
};
const TEAM_COLORS=['#f5a623','#e85d4a','#22c55e','#3b82f6','#8b5cf6','#06b6d4','#ec4899','#eab308'];
let _publicSessions = []; // sesiones no finalizadas, para el dropdown de login
let _lastLogoutCreds = null; // credenciales del último logout, para pre-rellenar el formulario
let _cdTimer = null, _cdValue = 0, _cdCaseIdx = -1;
let _pauseInFlight = false;

function startCountdown(caseIdx){
  if(_cdTimer){clearInterval(_cdTimer);_cdTimer=null;}
  _cdValue=5; _cdCaseIdx=caseIdx;
  _showCd();
  _playCountdownBeep(5);
  _cdTimer=setInterval(()=>{
    _cdValue--;
    if(_cdValue<=0){
      clearInterval(_cdTimer);_cdTimer=null;
      _showCd();
      _playGoSound();
      setTimeout(()=>{$('countdown-overlay').style.display='none';render();},700);
      return;
    }
    _showCd();
    _playCountdownBeep(_cdValue);
  },1000);
}
function _showCd(){
  const ov=$('countdown-overlay'); if(!ov)return;
  ov.style.display='flex';
  $('cd-label').textContent=`Comienza el Caso ${_cdCaseIdx+1} en`;
  const wrap=$('cd-num-wrap');
  if(_cdValue<=0){
    wrap.innerHTML=`<div class="cd-go">¡Go!</div>`;
  } else {
    wrap.innerHTML=`<div class="cd-num">${_cdValue}</div>`;
  }
}

// ══════════════════════════════════════════════════════
// PERSISTENCIA LOCAL (localStorage)
// ══════════════════════════════════════════════════════
function persistState(){
  try{
    const snap={
      view:S.view,session:S.session,team:S.team,admin:S.admin,role:S.role,roomCode:S.roomCode,
      timerRemaining:S.timerRemaining,timerEnd:S.timerEnd,paused:S.paused,
      adminTab:S.adminTab,adminSubTab:S.adminSubTab,
      leaderboard:S.leaderboard,lastResults:S.lastResults,
      answered:S.answered,selectedAnswer:S.selectedAnswer,skipDone:S.skipDone,
      skippedByTeam:S.skippedByTeam,answeredCount:S.answeredCount,
      users:S.users,allSessions:S.allSessions,awaitingReconnect:S.awaitingReconnect,
      teamColor:S.teamColor
    };
    localStorage.setItem('alm_state',JSON.stringify(snap));
  }catch{}
}
function restoreState(){
  try{
    const raw=localStorage.getItem('alm_state');
    if(!raw)return false;
    const snap=JSON.parse(raw);
    Object.assign(S,snap);
    S.quizReveal=null; // nunca restaurar el estado de reveal (el timeout se perdería)
    return true;
  }catch{return false;}
}
function clearPersistedState(){try{localStorage.removeItem('alm_state');}catch{}}

function logout(){
  clearTimeout(_reconnTimer);
  // Notificar al servidor antes de cerrar (logout explícito y trazable)
  if(S.ws?.readyState===1 && S.role && S.session?.roomCode){
    try{ S.ws.send(JSON.stringify({type:'LOGOUT'})); }catch(e){}
  }
  if(S.ws&&S.ws.readyState<2){S.ws.onclose=null;S.ws.onerror=null;S.ws.close();}
  S.ws=null; _isReconnecting=false;
  const el=document.getElementById('reconnect-overlay');if(el)el.remove();
  // Guardar credenciales en memoria para pre-rellenar HOME (se pierde al refrescar)
  _lastLogoutCreds = loadCreds();
  clearCreds(); clearPersistedState();
  Object.assign(S,{
    view:'HOME',role:null,session:null,team:null,admin:null,roomCode:null,
    leaderboard:[],lastResults:null,answered:false,selectedAnswer:null,
    skipDone:false,answeredCount:0,skippedByTeam:null,awaitingReconnect:[],quizReveal:null,
    paused:false,timerRemaining:0,timerEnd:null,waitingMsg:'',teamColor:'#f5a623'
  });
  render();
}

// ══════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════
const $=id=>document.getElementById(id);
const fmt=s=>{const m=Math.floor(s/60),sec=s%60;return `${m}:${sec.toString().padStart(2,'0')}`;};
function currentTimerTotal(){
  const s=S.session; if(!s) return 120;
  const map={STAGE_1:s.config?.stage1Time||60,STAGE_1_DEBATE:s.config?.stage1DebateTime||120,STAGE_2:s.config?.stage2Time||90,STAGE_2_DEBATE:s.config?.stage2DebateTime||300,STAGE_3:s.config?.stage3Time||60,STAGE_3_DEBATE:s.config?.stage3DebateTime||180,STAGE_4:120,RESULTS:s.config?.resultsTime||20,STAGE_RETRO:s.config?.retroTime||0};
  return map[s.currentStage]||120;
}

function toast(msg,type='info',duration=3200){
  const el=$('toast');el.innerHTML=msg;el.className=`show ${type}`;
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),duration);
}
function send(msg){
  if(S.ws?.readyState===1) S.ws.send(JSON.stringify(msg));
  else toast('Sin conexión al servidor','error');
}
function stageLabel(s){
  return ({LOBBY:'Sala de espera',STAGE_1:'Etapa 1 — Contexto inicial',STAGE_1_DEBATE:'Debate interno',
    STAGE_2:'Etapa 2 — Contexto ampliado',STAGE_2_DEBATE:'Debate (adelantar disponible)',
    STAGE_3:'Etapa 3 — Pista clave',STAGE_3_DEBATE:'Debate final',
    STAGE_4:'⚡ Resolución',RESULTS:'Resultados',STAGE_RETRO:'🔍 Retrospectiva',FINISHED:'Finalizado'})[s]||s;
}
function stageBadge(s){
  if(!s) return 'badge-gray';
  if(s.includes('1')) return 'badge-1';
  if(s.includes('2')) return 'badge-2';
  if(s.includes('3')) return 'badge-3';
  if(s.includes('4')) return 'badge-4';
  if(s==='RESULTS') return 'badge-ok';
  if(s==='STAGE_RETRO') return 'badge-retro';
  return 'badge-gray';
}

// ══════════════════════════════════════════════════════
// CREDENCIALES (sessionStorage — se borran al cerrar la pestaña)
// ══════════════════════════════════════════════════════
function saveCreds(c){try{sessionStorage.setItem('alm_creds',JSON.stringify(c));}catch{}}
function loadCreds(){try{return JSON.parse(sessionStorage.getItem('alm_creds'));}catch{return null;}}
function clearCreds(){try{sessionStorage.removeItem('alm_creds');}catch{}}
function updateCredsRoom(room){const c=loadCreds();if(c)saveCreds({...c,room});}
function buildLoginMsg(c){
  if(!c.email&&!c.pass) return {type:'PROJECTOR_JOIN',payload:{roomCode:c.room||undefined}};
  return {type:'UNIFIED_LOGIN',payload:{email:c.email,password:c.pass,roomCode:c.room||undefined}};
}
async function fetchPublicSessions(){
  try{
    const r=await fetch('/api/sessions/public');
    _publicSessions=await r.json();
    if(S.view==='HOME') render();
  }catch{_publicSessions=[];}
}

// ══════════════════════════════════════════════════════
// WEBSOCKET — con reconexión automática
// ══════════════════════════════════════════════════════
let _reconnDelay=1000, _reconnTimer=null, _isReconnecting=false;

// Heartbeat: envía PING cada 25s para mantener la conexión viva
setInterval(()=>{
  if(S.ws?.readyState===1 && S.role) S.ws.send(JSON.stringify({type:'PING'}));
},25000);

// ── Detección de cierre de pestaña/navegador ──────────────────────────────
// beforeunload: aviso al usuario si la sesión está activa
window.addEventListener('beforeunload', e=>{
  if(S.role && S.session?.status==='RUNNING'){
    e.preventDefault();
    e.returnValue='Si cierras esta pestaña causarás una desconexión y el timer se pausará. ¿Seguro?';
  }
});

// pagehide: se dispara solo cuando la página se descarga de verdad (no bfcache)
// Usamos sendBeacon para notificar al servidor de forma fiable
window.addEventListener('pagehide', e=>{
  if(e.persisted) return; // bfcache, no es un cierre real
  if(!S.role || !S.session?.roomCode) return;
  const displayName = S.role==='team'?(S.team?.teamName||'Equipo'):S.role==='admin'?(S.admin?.name||'Admin'):'Proyector';
  const payload=JSON.stringify({
    sessionCode: S.session.roomCode,
    role: S.role,
    teamId: S.team?.id||null,
    personId: S.admin?.id||null,
    name: displayName
  });
  navigator.sendBeacon('/api/beacon-disconnect', payload);
});

function connectWS(loginMsg){
  clearTimeout(_reconnTimer);
  // cerrar socket previo sin disparar onclose
  if(S.ws&&S.ws.readyState<2){S.ws.onclose=null;S.ws.onerror=null;S.ws.close();}
  const proto=location.protocol==='https:'?'wss':'ws';
  const ws=new WebSocket(`${proto}://${location.host}`);
  S.ws=ws;
  // timeout: si no conecta en 8s → error
  const TO=setTimeout(()=>{if(ws.readyState!==1){ws.onclose=null;ws.close();_onConnectFail();}},8000);
  ws.onopen=()=>{clearTimeout(TO);_reconnDelay=1000;ws.send(JSON.stringify(loginMsg));};
  ws.onmessage=e=>handleMsg(JSON.parse(e.data));
  ws.onerror=()=>{}; // onclose siempre vendrá después
  ws.onclose=()=>{clearTimeout(TO);_onWsClose();};
}

function _onConnectFail(){
  if(!S.role){showLoginError('No se puede conectar al servidor. ¿Está arrancado?');return;}
  _scheduleReconnect();
}
function _onWsClose(){
  if(!S.role){showLoginError('Conexión cerrada inesperadamente.');return;}
  _scheduleReconnect();
}
function _scheduleReconnect(){
  const saved=loadCreds();
  if(!saved){S.role=null;S.view='HOME';render();toast('Sesión perdida. Inicia sesión de nuevo.','error');return;}
  _isReconnecting=true;
  _showReconnectOverlay(_reconnDelay/1000);
  _reconnTimer=setTimeout(()=>connectWS(buildLoginMsg(saved)),_reconnDelay);
  _reconnDelay=Math.min(_reconnDelay*2,30000);
}
function _showReconnectOverlay(secs){
  let el=$('reconnect-overlay');
  if(!el){el=document.createElement('div');el.id='reconnect-overlay';el.className='reconnect-overlay';document.body.appendChild(el);}
  el.innerHTML=`<div class="spinner"></div>
    <h3>Reconectando...</h3>
    <p>Conexión perdida. Reintentando en ${Math.round(secs)}s</p>
    <button class="btn btn-ghost btn-sm" onclick="forceReconnect()">Reintentar ahora</button>`;
}
function hideReconnectOverlay(){
  _isReconnecting=false;
  const el=$('reconnect-overlay');if(el)el.remove();
}
function forceReconnect(){
  clearTimeout(_reconnTimer);_reconnDelay=1000;
  const saved=loadCreds();
  if(!saved){hideReconnectOverlay();S.role=null;S.view='HOME';render();return;}
  connectWS(buildLoginMsg(saved));
}

function setLoginLoading(on){
  const btn=$('login-btn');if(!btn)return;
  btn.disabled=on;
  btn.innerHTML=on?'<span class="spinner" style="width:16px;height:16px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:.4rem"></span>Conectando...':'Entrar →';
}
function showLoginError(msg){
  setLoginLoading(false);
  toast(msg,'error');
  // Mostrar también en el formulario de forma persistente
  const el=$('login-error-msg');
  if(el){el.textContent=msg;el.style.display='block';}
  S.loginError=msg;
}
function clearLoginError(){
  const el=$('login-error-msg');
  if(el){el.textContent='';el.style.display='none';}
  S.loginError=null;
}

// ══════════════════════════════════════════════════════
// SONIDOS — "¿Quién quiere ser millonario?" style
// ══════════════════════════════════════════════════════
function playWinSound(){
  try{
    const ctx=new AudioContext();
    // Fanfarria ascendente: C-E-G-C + acorde final
    [{f:523,t:0,d:.13},{f:659,t:.12,d:.13},{f:784,t:.24,d:.13},
     {f:1047,t:.36,d:.55},{f:784,t:.36,d:.55},{f:659,t:.36,d:.55}
    ].forEach(({f,t,d})=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='square';o.frequency.value=f;
      g.gain.setValueAtTime(.13,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+d);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+d+.05);
    });
  }catch(e){}
}
function playLoseSound(){
  try{
    const ctx=new AudioContext();
    // Trombón triste: wah-wah-wah-waaah descendente
    [{f:466,t:0,d:.38},{f:415,t:.38,d:.38},{f:370,t:.76,d:.38},{f:311,t:1.14,d:.85}
    ].forEach(({f,t,d})=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      const vib=ctx.createOscillator(),vg=ctx.createGain();
      vib.frequency.value=5;vg.gain.value=7;
      vib.connect(vg);vg.connect(o.frequency);
      o.connect(g);g.connect(ctx.destination);
      o.type='sawtooth';o.frequency.value=f;
      g.gain.setValueAtTime(.18,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+d);
      vib.start(ctx.currentTime+t);vib.stop(ctx.currentTime+t+d+.05);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+d+.05);
    });
  }catch(e){}
}

function handleMsg(m){
  switch(m.type){
    case 'ADMIN_LOGIN_OK':
      S.admin=m.admin; S.role='admin';
      S.users=m.users||{people:[],teams:[]}; S.allSessions=m.sessions||[];
      if(m.library) S.library=m.library;
      S.view='ADMIN';
      hideReconnectOverlay(); setLoginLoading(false);
      persistState(); render();
      {const c=loadCreds();const roomToJoin=c?.room||m.activeSessionCode;if(roomToJoin)send({type:'ADMIN_JOIN_SESSION',payload:{roomCode:roomToJoin}});}
      break;

    case 'SESSION_CREATED':
      S.session=m.session; S.roomCode=m.session.roomCode;
      S.leaderboard=[]; S.lastResults=null;
      S.allSessions=[...S.allSessions,{roomCode:m.session.roomCode,status:'LOBBY',casesCount:0,teamsCount:0}];
      updateCredsRoom(m.session.roomCode);
      S.adminTab='casos'; persistState(); render();
      showCredentialsModal(m.session.roomCode, m.credentials||[]);
      break;

    case 'SESSION_STATE':
      S.session=m.session; S.roomCode=m.session.roomCode;
      S.leaderboard=m.leaderboard||[];
      S.paused=m.paused||false;
      S.timerRemaining=m.paused?m.pausedRemaining||0:(m.timerEnd?Math.max(0,Math.ceil((m.timerEnd-Date.now())/1000)):0);
      S.timerEnd=m.timerEnd;
      S.awaitingReconnect=m.awaitingReconnect||[];
      updateCredsRoom(m.session.roomCode);
      S.adminTab='control'; persistState(); render(); break;

    case 'TEAM_LOGIN_OK':
      S.team=m.team; S.role='team'; S.session=m.session;
      S.teamColor=m.team.color||'#f5a623';
      S.roomCode=m.session.roomCode; S.view='TEAM';
      S.awaitingReconnect=m.awaitingReconnect||m.session.awaitingReconnect||[];
      if(m.session.status==='RUNNING'){
        S.leaderboard=m.leaderboard||[];
        S.lastResults=m.lastResults||null;
        S.paused=m.paused||false;
        S.timerEnd=m.timerEnd||null;
        S.timerRemaining=m.paused?(m.pausedRemaining||0):(m.timerEnd?Math.max(0,Math.ceil((m.timerEnd-Date.now())/1000)):0);
        // Restore skip state from session
        S.skipDone=m.session.skipTeamId===m.team.id;
        S.skippedByTeam=m.session.skipTeamId
          ?{id:m.session.skipTeamId,name:m.session.teams?.find(t=>t.id===m.session.skipTeamId)?.teamName||'Equipo'}
          :null;
        // Restaurar respuesta ya enviada (evita doble respuesta tras reconexión)
        const _myAns=m.session.answers?.[m.team.id];
        S.answered=!!_myAns;
        S.selectedAnswer=_myAns?.answerIndex??null;
        S.answeredCount=Object.keys(m.session.answers||{}).length;
      } else {
        S.leaderboard=[]; S.lastResults=null;
        S.answered=false; S.selectedAnswer=null; S.skipDone=false;
        S.answeredCount=0; S.skippedByTeam=null;
      }
      hideReconnectOverlay(); setLoginLoading(false);
      persistState(); render(); break;

    case 'PROJECTOR_JOIN_OK':
      S.session=m.session; S.role='projector';
      S.leaderboard=m.leaderboard||[]; S.view='PROJECTOR';
      S.awaitingReconnect=m.awaitingReconnect||m.session.awaitingReconnect||[];
      S.paused=m.paused||false;
      S.timerEnd=m.timerEnd||null;
      S.timerRemaining=m.paused?(m.pausedRemaining||0):(m.timerEnd?Math.max(0,Math.ceil((m.timerEnd-Date.now())/1000)):0);
      S.lastResults=m.lastResults||null;
      hideReconnectOverlay(); setLoginLoading(false);
      persistState(); render(); break;

    case 'WAITING':
      S.waitingMsg=m.message; S.view='WAITING';
      setLoginLoading(false); render(); break;

    case 'SESSION_AVAILABLE':
      // El servidor tiene sesión activa ahora — reintentar login
      {const c=loadCreds();if(c)connectWS(buildLoginMsg(c));}
      break;

    case 'AUTH_ERROR':
      showLoginError(m.message);
      if(_isReconnecting){
        _isReconnecting=false; hideReconnectOverlay(); clearCreds(); clearPersistedState();
        S.role=null; S.view='HOME'; render();
        toast('Sesión expirada. Por favor, inicia sesión de nuevo.','error');
      }
      break;

    case 'CLIENT_DISCONNECTED':
      S.awaitingReconnect=m.awaitingReconnect||[];
      toast(`⚠️ ${m.name} se ha desconectado — timer pausado`,'error');
      refreshDisconnectBanner(); syncPauseBtn(); break;

    case 'CLIENT_RECONNECTED':
      S.awaitingReconnect=m.awaitingReconnect||[];
      toast(`✅ ${m.name} reconectado${S.awaitingReconnect.length===0?' — timer reanudado':''}`,'success');
      refreshDisconnectBanner(); syncPauseBtn(); break;

    case 'SESSION_STARTED':
      S.session=m.session; S.answered=false; S.selectedAnswer=null;
      S.skipDone=false; S.lastResults=null; S.skippedByTeam=null;
      persistState(); render();
      break;

    case 'RETRO_SUBSTEP':
      S.retroSubstep=m.substep;
      if(m.session) S.session=m.session;
      if(m.substep!==0) _stopRetroScroll();
      render(); break;

    case 'STAGE_CHANGE':
      S.session=m.session; S.answered=false; S.selectedAnswer=null; S.wildcardUsed=false;
      S.skippedByTeam=null; S.answeredCount=0; S.paused=false; S.awaitingReconnect=[];
      S.adminPodiumOpen=false;
      _stopRetroScroll();
      if(m.session.currentStage==='STAGE_RETRO') S.retroSubstep=m.session.retroSubstep||0;
      persistState();
      // Cancelar cualquier disparo de Luis pendiente al cambiar de etapa
      if(_luisTriggerTimer){clearTimeout(_luisTriggerTimer);_luisTriggerTimer=null;}
      if((S.role==='team'||S.role==='projector') && m.session.currentStage==='STAGE_1'){
        _resetSlackAnim(m.session.currentCaseIndex); // reset so animation plays fresh
        startCountdown(m.session.currentCaseIndex);
        if(S.role==='projector'){
          // Disparar Luis a la mitad del tiempo configurado (proporcionalmente)
          // La cadena Luis→Javier→Adrián→SM dura ~22s con 5s de gap entre cada uno
          const stage1Secs = m.session.config?.stage1Time||45;
          const delayMs = Math.round(stage1Secs * 0.45) * 1000; // ~45% del tiempo → Ej: 45s → 20s
          const caseIdx = m.session.currentCaseIndex;
          _luisTriggerTimer = setTimeout(()=>{ _luisTriggerTimer=null; _runLuisMsg(caseIdx); }, delayMs);
        }
      } else {
        if(S.role==='projector' && m.session.currentStage==='STAGE_2') _resetGitlabAnim(m.session.currentCaseIndex);
        if(S.role==='projector' && m.session.currentStage==='STAGE_3') _resetStage3Anim(m.session.currentCaseIndex);
        render();
      }
      break;

    case 'TIMER_TICK':
      S.timerRemaining=m.remaining; S.timerEnd=m.timerEnd; S.paused=false;
      updateTimerUI(); break;

    case 'TIMER_PAUSED':
      S.paused=true; S.timerRemaining=m.remaining;
      updateTimerUI(); syncPauseBtn(); break;

    case 'TIMER_RESUMED':
      S.paused=false; S.timerRemaining=m.remaining;
      S.awaitingReconnect=[];
      updateTimerUI(); syncPauseBtn(); break;

    case 'TEAMS_UPDATED':
      if(S.session){
        S.session.teams=m.teams;
        if(m.projectorConnected!==undefined) S.session.projectorConnected=m.projectorConnected;
      }
      S.leaderboard=m.leaderboard||[];
      refreshLeaderboards(); refreshTeamList();
      if(S.role==='admin') render(); // siempre: actualiza dots de conexión en LOBBY y RUNNING
      break;

    case 'TEAM_SKIPPED':
      S.skippedByTeam={id:m.teamId,name:m.teamName};
      toast(`⚡ ${m.teamName} ha adelantado a la resolución!`,'info');
      _playSkipSound();
      refreshSkipBanner(); break;

    case 'TEAM_ANSWERED':
      S.answeredCount=m.totalAnswered;
      refreshAnswerBars(m.totalAnswered,m.totalTeams); break;

    case 'WILDCARD_USED':
      toast(`🃏 El equipo <strong>${m.teamName}</strong> ha usado el comodín del 50%`,'wildcard',4000);
      _playWildcardSound();
      if(S.team && m.teamId===S.team.id) S.wildcardUsed=true;
      render(); break;

    case 'CASE_RESULTS':
      S.lastResults=m; S.leaderboard=m.leaderboard||[];
      if(S.session){ S.session.currentStage='RESULTS'; if(m.eventLog) S.session.eventLog=m.eventLog; }
      S.quizReveal={ correctIndex:m.correctAnswerIndex, myResult:m.results?.find(r=>r.teamId===S.team?.id)||null };
      persistState(); render();
      if(S.role==='team'){
        if(S.quizReveal.myResult?.isCorrect) playWinSound(); else if(S.quizReveal.myResult) playLoseSound();
      }
      setTimeout(()=>{ S.quizReveal=null; render(); }, 4000);
      break;

    case 'SESSION_FINISHED':
      S.leaderboard=m.leaderboard||[];
      if(S.session) S.session.status='FINISHED';
      persistState(); render(); break;

    case 'SHOW_PODIUM':
      S.podiumMode='suspense';
      if(m.leaderboard) S.leaderboard=m.leaderboard;
      persistState(); render(); break;

    case 'PODIUM_REVEAL':
      S.podiumMode='reveal';
      persistState(); render(); break;

    case 'CONFIG_UPDATED':
      if(S.session) S.session.config=m.config;
      toast('Configuración guardada','success'); break;

    case 'USERS_UPDATED':
      S.users=m.users||{people:[],teams:[]}; closeModal(); persistState(); render(); break;

    case 'CASES_UPDATED':
      if(S.session) S.session.cases=m.cases;
      S.editingCase=null;
      if(m.importResult) toast(`Importados: ${m.importResult.imported} casos${m.importResult.skipped?` (${m.importResult.skipped} omitidos por datos incompletos)`:''}`,'success');
      persistState(); render(); break;

    case 'LIBRARY_DATA':
      S.library=m.cases||[];
      S.editingCase=null;
      if(m.importResult) toast(`Importados a biblioteca: ${m.importResult.imported} casos${m.importResult.skipped?` (${m.importResult.skipped} omitidos)`:''}`,'success');
      persistState(); render(); break;

    case 'ELIGIBLE_UPDATED':
      if(S.session) S.session.eligibleCaseIds=m.eligibleCaseIds||[];
      persistState(); render(); break;

    case 'STATE_SYNC':
      S.session=m.session; S.leaderboard=m.leaderboard||[];
      S.paused=m.paused||false; S.timerRemaining=m.remaining||0; S.timerEnd=m.timerEnd;
      render(); break;

    case 'SESSION_KILLED':
      if(S.role==='admin'){
        S.allSessions=S.allSessions.filter(s=>s.roomCode!==m.roomCode);
        if(S.session?.roomCode===m.roomCode){
          S.session=null; S.roomCode=null; S.adminTab='sesiones';
          S.leaderboard=[]; S.lastResults=null;
          S.answered=false; S.selectedAnswer=null; S.skipDone=false;
          S.answeredCount=0; S.skippedByTeam=null;
        }
        toast(`Sesión ${m.roomCode} eliminada`,'success');
        persistState(); render();
      } else {
        clearCreds(); clearPersistedState();
        S.session=null; S.role=null; S.view='HOME';
        fetchPublicSessions(); render();
        toast('La sesión ha sido terminada por el administrador','error');
      }
      break;

    case 'SESSIONS_UPDATED':
      S.allSessions=m.sessions||[];
      persistState(); render(); break;

    case 'PONG': break; // heartbeat response, no-op
    case 'ERROR': toast(m.message,'error'); break;
  }
}

function _splitStage2Legacy(text){
  if(!text) return ['',''];
  const mid=Math.floor(text.length/2);
  let best=-1, bestDist=Infinity;
  for(const m of text.matchAll(/[.!?]\s+/g)){
    const d=Math.abs(m.index-mid);
    if(d<bestDist){bestDist=d;best=m.index+m[0].length;}
  }
  if(best>10&&best<text.length-10) return [text.slice(0,best).trim(),text.slice(best).trim()];
  return [text.slice(0,mid).trim(),text.slice(mid).trim()];
}

function _animateReactionCounter(id,maxCount){
  const el=document.getElementById(id);
  if(!el) return;
  el.style.display='inline-flex';
  const span=el.querySelector('span');
  if(span) span.textContent='1';
  el.classList.remove('react-pop');
  void el.offsetWidth;
  el.classList.add('react-pop');
  let count=1;
  const tick=()=>{
    if(count>=maxCount) return;
    count++;
    if(span) span.textContent=count;
    el.classList.remove('react-bounce');
    void el.offsetWidth;
    el.classList.add('react-bounce');
    if(count<maxCount) setTimeout(tick,1500+Math.random()*1500);
  };
  if(maxCount>1) setTimeout(tick,1500+Math.random()*1500);
}

      if(msg){msg.classList.add('visible');setTimeout(()=>{if(msgs)msgs.scrollTop=msgs.scrollHeight;},50);}
      if(sound==='ding') _playSlackDing();

function _runLuisMsg(caseIdx){
  if(_luisAnimated[caseIdx]) return;
  _luisAnimated[caseIdx]=true;
  const msgs=document.getElementById('slack-msgs');
  const _showTyping=(id,cb)=>{
    const t=document.getElementById('slack-typing-'+id);
    if(t) t.classList.add('show');
    if(msgs) msgs.scrollTop=msgs.scrollHeight;
    setTimeout(()=>{
      if(t) t.classList.remove('show');
      const m=document.getElementById('slack-m-'+id);
      if(m){m.classList.add('visible');setTimeout(()=>{if(msgs)msgs.scrollTop=msgs.scrollHeight;},50);}
      _playSlackDing();
      if(cb) setTimeout(cb,5000);
    },1600);
  };
  _showTyping('luis',()=>{
    setTimeout(()=>_animateReactionCounter('slack-react-luis',4+Math.floor(Math.random()*3)),1000);
    _showTyping('javier',()=>{
      setTimeout(()=>_animateReactionCounter('slack-react-javier',5+Math.floor(Math.random()*3)),1000);
      _showTyping('adrian',()=>_showTyping('sm-reply',null));
    });
  });
}

function _runGitlabAnim(caseIdx){
  if(_gitlabAnimated[caseIdx]) return;
  const thread=document.getElementById('gl-thread');
  // Collect all typing/comment pairs dynamically
  const pairs=[];
  let i=1;
  while(document.getElementById('gl-typing-'+i)){
    pairs.push({t:document.getElementById('gl-typing-'+i),c:document.getElementById('gl-c'+i)});
    i++;
  }
  if(pairs.length===0) return;
  _gitlabAnimated[caseIdx]=true;
  let delay=400;
  const typingDur=1600, gap=700;
  for(const {t,c} of pairs){
    setTimeout(()=>{if(t){t.classList.add('show');if(thread)thread.scrollTop=thread.scrollHeight;}},delay);
    delay+=typingDur;
    setTimeout(()=>{
      if(t) t.classList.remove('show');
      if(c){c.classList.add('visible');setTimeout(()=>{if(thread)thread.scrollTop=thread.scrollHeight;},50);}
      _playGitlabNotif();
    },delay);
    delay+=gap;
  }
  // Luis ~8s after last message
  const luisDelay=delay+8000;
  setTimeout(()=>{
    if(_luisGlAnimated[caseIdx]) return;
    _luisGlAnimated[caseIdx]=true;
    const tl=document.getElementById('gl-typing-luis');
    if(tl){tl.classList.add('show');if(thread)thread.scrollTop=thread.scrollHeight;}
    setTimeout(()=>{
      if(tl) tl.classList.remove('show');
      const cl=document.getElementById('gl-c-luis');
      if(cl){cl.classList.add('visible');setTimeout(()=>{if(thread)thread.scrollTop=thread.scrollHeight;},50);}
      _playGitlabNotif();
    },1800);
  },luisDelay);
}

function _runStage3Anim(caseIdx){

  const msg=document.getElementById('s3-msg');

}

let _lastBeepSec=-1;
function updateTimerUI(){
  document.querySelectorAll('.timer-display').forEach(el=>{
    const totalRaw=parseInt(el.dataset.total);
    const radius=50, circ=2*Math.PI*radius;
    const prog=el.querySelector('.progress');
    const tt=el.querySelector('.time-text');
    const st=el.querySelector('.status-text');
    if(totalRaw===0){
      // Sin límite: ring gris estático
      if(prog){prog.style.strokeDashoffset=0;prog.style.stroke='#374151';prog.style.strokeDasharray=circ;}
      if(tt) tt.textContent='∞';
      if(st) st.textContent='sin límite';
      el.classList.remove('timer-urgent');
      return;
    }
    const total=totalRaw||120, r=S.timerRemaining;
    const pct=Math.max(0,r/total);
    const isUrgent=r>0&&pct<=0.15;
    const color=pct>0.5?'#22c55e':pct>0.15?'#f5a623':'#ef4444';
    if(prog){prog.style.strokeDashoffset=circ*(1-pct);prog.style.stroke=color;prog.style.strokeDasharray=circ;}
    if(tt) tt.textContent=fmt(r);
    if(st) st.textContent=S.paused?'PAUSADO':'restante';
    el.classList.toggle('timer-urgent',isUrgent&&!S.paused);
  });
  // sonido urgente: un beep por segundo sincronizado con el tick
  const r=S.timerRemaining, total=currentTimerTotal();
  if(r>0&&r/total<=0.15&&!S.paused&&r!==_lastBeepSec){
    _lastBeepSec=r;
    _playUrgentBeep();
  }
}

        <div class="grid-2">
          <div><label>Autor del cierre</label><input id="c-gl-closing-author" value="${(c.retro&&c.retro.glClosing&&c.retro.glClosing.author)||''}"/></div>
          <div><label>Texto del cierre</label>${mdEditor('c-gl-closing-body',(c.retro&&c.retro.glClosing&&c.retro.glClosing.body)||'',{minH:'52px'})}</div>

      <div class="flex gap-1">
        <button class="btn btn-ghost btn-sm" onclick="openImportCases()">📥 Importar JSON</button>
        <button class="btn btn-primary btn-sm" onclick="S.editingCase='new';render()">+ Nuevo caso</button>

              <div style="font-size:.72rem;color:var(--text-dim)">${c.points} pts · Correcta: ${c.correctAnswerIndex!==undefined?String.fromCharCode(65+c.correctAnswerIndex):'?'}</div>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="S.editingCase='${c.id}';render()" style="padding:.2rem .45rem;font-size:.8rem" title="Editar">✏️</button>

        <div class="section-title" style="margin-bottom:.65rem">🎮 Orden de juego <span style="font-weight:400;color:var(--text-dim)">(${eligible.length})</span></div>

                <div style="font-size:.72rem;color:var(--text-dim)">${c.points} pts</div>

      </div>

function saveCase(ec){
  const title=$('c-title')?.value.trim(), pts=parseInt($('c-pts')?.value)||100;
  const s1=$('c-s1')?.value.trim(), s3=$('c-s3')?.value.trim();
  const stage2Messages=Array.from(document.querySelectorAll('#s2-msgs-list .s2-msg-row')).map(row=>({type:row.querySelector('.s2-msg-type')?.value||'Tecnico',text:(row.querySelector('.s2-msg-text')?.value||'').trim()})).filter(m=>m.text);
  const s1titulo=($('c-s1titulo')?.value||'').trim();
  const s1contexto=($('c-s1contexto')?.value||'').trim();
  const s1impacto=($('c-s1impacto')?.value||'').trim();
  const debatePregunta=($('c-debate-pregunta')?.value||'').trim();
  const debateDesafio=($('c-debate-desafio')?.value||'').trim();
  const moraleja=($('c-moraleja')?.value||'').trim();
  const hours=parseFloat($('c-hours')?.value)||0;
  const answers=[0,1,2,3].map(i=>$(`c-a${i}`)?.value.trim()||'');
  const correct=parseInt(document.querySelector('input[name="correct-ans"]:checked')?.value??0);
  const titanAnswerIndices=Array.from(document.querySelectorAll('input[name="titan-ans"]:checked')).map(el=>parseInt(el.value));
  if(!title){toast('El título es obligatorio','error');return;}
  if(!s1||stage2Messages.length===0||!s3){toast('Completa las 3 etapas','error');return;}
  if(answers.filter(Boolean).length<4){toast('Añade las 4 opciones de respuesta','error');return;}
  if(titanAnswerIndices.length!==2){toast('Marca exactamente 2 opciones Titán (para el comodín 50%)','error');return;}
  const glProject=($('c-gl-project')?.value||'').trim();
  const glIssueNum=parseInt($('c-gl-issue-num')?.value)||null;
  const glProjectPath=($('c-gl-project-path')?.value||'').trim();
  const glLabelsRaw=($('c-gl-labels')?.value||'').trim();
  const glLabels=glLabelsRaw?glLabelsRaw.split(',').map(l=>l.trim()).filter(Boolean):[];
  const glTitle=($('c-gl-title')?.value||'').trim();
  const glDescription=($('c-gl-description')?.value||'').trim();
  const glComments=Array.from(document.querySelectorAll('#gl-comments-list .gl-comment-row')).map(row=>({author:(row.querySelector('.gl-comment-author')?.value||'').trim(),body:(row.querySelector('.gl-comment-body')?.value||'').trim()})).filter(cm=>cm.author||cm.body);
  const glClosingAuthor=($('c-gl-closing-author')?.value||'').trim();
  const glClosingBody=($('c-gl-closing-body')?.value||'').trim();
  const retro={gitlabProject:glProject,gitlabIssueNumber:glIssueNum,glProjectPath,glTitle,glDescription,glComments,glClosing:{author:glClosingAuthor,body:glClosingBody},glLabels};
  const existingCase = ec==='new' ? {} : (S.library.find(x=>x.id===ec)||{});
  const caseData = {
    ...existingCase,
    title, points:pts,
    stage1:s1, stage2Messages, stage3:s3,
    stage1Titulo:s1titulo, stage1Contexto:s1contexto, stage1Impacto:s1impacto,
    debatePregunta, debateDesafio, moraleja, hoursImputed:hours,
    answers, correctAnswerIndex:correct, titanAnswerIndices,
    retro,
    id: ec==='new'?null:ec
  };
  send({type:'ADMIN_SAVE_CASE',payload:{caseData}});
}
function mdEditor(id,value,opts={}){
  const minH=opts.minH||'80px';const cls=opts.cls||'';const ph=opts.placeholder||'';const st=opts.style||'';
  const idA=id?`id="${id}"`:'';
  return `<div class="md-editor-wrap"><div class="md-editor-tabs"><button type="button" class="md-tab md-tab-on" onclick="mdTab(this,'write')">Escribir</button><button type="button" class="md-tab" onclick="mdTab(this,'preview')">Vista previa</button></div><textarea ${idA} class="${cls}" style="min-height:${minH};${st}" placeholder="${ph}">${value}</textarea><div class="md-preview-pane" style="display:none;min-height:${minH}"></div></div>`;
}
function mdTab(btn,mode){
  const w=btn.closest('.md-editor-wrap');
  w.querySelectorAll('.md-tab').forEach(t=>t.classList.remove('md-tab-on'));
  btn.classList.add('md-tab-on');
  const ta=w.querySelector('textarea');const pane=w.querySelector('.md-preview-pane');
  if(mode==='preview'){
    pane.innerHTML=_renderMd(ta.value)||'<span style="color:var(--text-dim);font-style:italic">Sin contenido</span>';
    ta.style.display='none';pane.style.display='block';
  } else {ta.style.display='';pane.style.display='none';}
}
function addS2Msg(){
  const list=document.getElementById('s2-msgs-list');
  if(!list||list.children.length>=5) return;
  const row=document.createElement('div');
  row.className='s2-msg-row';
  row.style.cssText='display:grid;grid-template-columns:110px 1fr 28px;gap:.4rem;align-items:start';
  row.innerHTML=`<select class="s2-msg-type" style="padding:.3rem .4rem;font-size:.8rem;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;color:var(--text)"><option value="Tecnico">🔧 Técnico</option><option value="Funcional">📋 Funcional</option></select>${mdEditor('','',{cls:'s2-msg-text',minH:'60px',style:'font-size:.82rem',placeholder:'Texto del mensaje...'})}<button type="button" onclick="delS2Msg(this)" style="padding:.2rem .35rem;font-size:.85rem;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:6px;cursor:pointer;line-height:1;height:28px">✕</button>`;
  list.appendChild(row);
}
function delS2Msg(btn){
  const list=document.getElementById('s2-msgs-list');
  if(!list||list.children.length<=1) return;
  btn.closest('.s2-msg-row')?.remove();
}
function addGlComment(){
  const list=document.getElementById('gl-comments-list');
  if(!list) return;
  const row=document.createElement('div');
  row.className='gl-comment-row';
  row.style.cssText='display:grid;grid-template-columns:160px 1fr 28px;gap:.4rem;align-items:start';
  row.innerHTML=`<input class="gl-comment-author" placeholder="autor"/>${mdEditor('','',{cls:'gl-comment-body',minH:'52px',style:'font-size:.82rem',placeholder:'Comentario...'})}<button type="button" onclick="delGlComment(this)" style="padding:.2rem .35rem;font-size:.85rem;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:6px;cursor:pointer;line-height:1;height:28px">✕</button>`;
  list.appendChild(row);
}
function delGlComment(btn){btn.closest('.gl-comment-row')?.remove();}
function delCase(id){if(!confirm('¿Eliminar este caso de la biblioteca?'))return;send({type:'ADMIN_DELETE_CASE',payload:{caseId:id}});}
function addEligible(caseId){send({type:'SESSION_ADD_ELIGIBLE',payload:{caseId}});}
function removeEligible(caseId){send({type:'SESSION_REMOVE_ELIGIBLE',payload:{caseId}});}
let _elDragId=null;
function elDragStart(e,id){_elDragId=id;e.dataTransfer.effectAllowed='move';e.currentTarget.style.opacity='.4';}
function elDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.style.outline='2px solid var(--accent)';}
function elDrop(e,targetId){
  e.preventDefault();e.currentTarget.style.outline='';
  if(!_elDragId||_elDragId===targetId){_elDragId=null;return;}
  const ids=[...(S.session?.eligibleCaseIds||[])];
  const from=ids.indexOf(_elDragId),to=ids.indexOf(targetId);
  if(from<0||to<0){_elDragId=null;return;}
  ids.splice(from,1);ids.splice(to,0,_elDragId);
  _elDragId=null;
  S.session.eligibleCaseIds=ids;
  send({type:'SESSION_REORDER_ELIGIBLE',payload:{caseIds:ids}});
  render();
}
function elDragEnd(e){e.currentTarget.style.opacity='';e.currentTarget.style.outline='';_elDragId=null;}

function openImportCases(){
  openModal(`<div class="modal">
    <h3 style="font-size:1.1rem;font-weight:700;margin-bottom:.5rem">Importar casos desde JSON</h3>
    <p style="font-size:.82rem;color:var(--text-dim);margin-bottom:1rem">Pega el contenido del fichero JSON o usa el selector. Formato: array <code>cases</code> con campos <code>title, stage1, stage2, stage3, answers[4], correctAnswerIndex</code>.</p>
    <div class="flex col gap-2">
      <div><label>Archivo JSON</label><input type="file" id="imp-file" accept=".json" onchange="loadImportFile(this)" style="cursor:pointer"/></div>
      <div><label>O pega el JSON aquí</label><textarea id="imp-json" style="min-height:120px;font-family:var(--font-mono);font-size:.78rem" placeholder='{"cases":[{"title":"...","points":100,"stage1":"...","stage2":"...","stage3":"...","answers":["A","B","C","D"],"correctAnswerIndex":0}]}'></textarea></div>
      <div class="flex gap-2" style="margin-top:.5rem">
        <button class="btn btn-primary" onclick="doImportCases()">Importar</button>
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      </div>
    </div>
  </div>`);
}
function loadImportFile(input){
  const f=input.files?.[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{const ta=$('imp-json');if(ta)ta.value=e.target.result;};
  r.readAsText(f);
}
function doImportCases(){
  const raw=$('imp-json')?.value.trim();
  if(!raw){toast('Pega o selecciona un JSON','error');return;}
  let data;
  try{data=JSON.parse(raw);}catch(e){toast('JSON inválido: '+e.message,'error');return;}
  const cases=Array.isArray(data)?data:(data.cases||[]);
  if(!cases.length){toast('No se encontraron casos en el JSON','error');return;}
  send({type:'ADMIN_IMPORT_CASES',payload:{cases}});
  closeModal();
}

// ─ Control ─
function renderControl(){
  const s=S.session; if(!s) return noSession();
  const running=s.status==='RUNNING', finished=s.status==='FINISHED';
  const cc=s.cases[s.currentCaseIndex];
  const stages=['STAGE_1','STAGE_1_DEBATE','STAGE_2','STAGE_2_DEBATE','STAGE_3','STAGE_3_DEBATE','STAGE_4','RESULTS','STAGE_RETRO'];
  return `<div style="max-width:680px">
    <h2 style="font-size:1.3rem;font-weight:700;margin-bottom:1.5rem">Control · <span style="color:var(--accent);font-family:var(--font-mono)">${s.roomCode}</span></h2>

    ${!running&&!finished?`<div class="card card-accent text-center" style="padding:2.5rem;margin-bottom:1.5rem">

      <div class="section-title">Avance manual de etapa</div>
      <div class="flex" style="flex-wrap:wrap;gap:.5rem;margin-top:.5rem">

          rows.push(`<div style="display:flex;align-items:center;gap:.4rem;padding:.3rem .75rem;border-radius:6px;border:1px solid ${projConn?'var(--green)':'var(--red)'};background:${projConn?'rgba(34,197,94,.08)':'rgba(239,68,68,.08)'}"><div class="dot-conn ${projConn?'':'off'}"></div><span style="font-size:.82rem">Proyector</span>${projConn?`<button onclick="kickClient('projector',null)" title="Forzar desconexión" style="margin-left:.3rem;background:none;border:none;cursor:pointer;color:var(--red);font-size:.75rem;padding:0 .2rem" >✕</button>`:''}</div>`);

          });

      </div>

    ${finished?`<div class="card" style="margin-bottom:1rem;border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.04)">

        </div>
        <div style="margin-left:auto;display:flex;gap:.5rem;flex-wrap:wrap">
          ${S.adminPodiumOpen?
            `<button class="btn btn-sm" style="background:rgba(245,166,35,.2);border:1px solid rgba(245,166,35,.5);color:var(--accent)" onclick="S.adminPodiumOpen=false;render()">← Cerrar podio</button>`:
            `<button class="btn btn-sm" style="background:rgba(245,166,35,.2);border:1px solid rgba(245,166,35,.5);color:var(--accent)" onclick="S.adminPodiumOpen=true;send({type:'ADMIN_SHOW_PODIUM'});render()">🏆 Pantalla de podio</button>`
          }
        </div>
      </div>
      ${S.adminPodiumOpen?`

        <div style="margin-bottom:.75rem">
          ${(S.leaderboard||[]).map(t=>`<div style="display:flex;align-items:center;gap:.75rem;padding:.35rem .5rem;border-radius:6px;background:rgba(255,255,255,.03);margin-bottom:.3rem">

          🎬 Mostrar resultados al proyector
        </button>
        <div style="font-size:.72rem;color:var(--text-dim);text-align:center;margin-top:.4rem">El proyector mostrará el podio animado con música</div>
      </div>`:''}

    <div class="card">
      <div class="section-title">Clasificación en tiempo real</div>
      <div data-lb class="flex col gap-1" style="margin-top:.5rem">${lbHTML()}</div>
    </div>
  </div>`;
}
function startSession(){send({type:'ADMIN_START_SESSION'});}
function forceStage(st){send({type:'ADMIN_FORCE_STAGE',payload:{stage:st}});}
function nextCase(){send({type:'ADMIN_NEXT_CASE'});}
function confirmForcePodium(){
  const s=S.session;
  const done=s?.currentCaseIndex||0;
  const ok=confirm(`⚠️ FINALIZACIÓN ANTICIPADA\n\nEsto terminará la sesión ahora mismo con ${done} caso(s) completado(s).\n\nSe mostrará el podio con las puntuaciones actuales.\nLos equipos pasarán a la pantalla de espera.\n\n¿Confirmas que quieres acabar la sesión?`);
  if(ok) send({type:'ADMIN_FORCE_PODIUM'});
}
function retroNextSubstep(){send({type:'RETRO_ADVANCE_SUBSTEP'});}
function retroGoSubstep(n){send({type:'RETRO_GO_SUBSTEP',payload:{substep:n}});}
function kickClient(role,teamId){
  if(!confirm(`¿Forzar desconexión de ${role==='projector'?'el Proyector':'el equipo'}?`)) return;
  send({type:'ADMIN_KICK_CLIENT',payload:{role,teamId}});
}
function showCredentialsModal(roomCode, credentials){
  const url = window.location.origin;
  let lines = `🏭 *GÜERJAUS TBT* — ¡La dinámica está lista!\n\n`;
  lines += `🔗 ${url}\n`;
  lines += `🏠 Código de sala: *${roomCode}*\n\n`;
  if(credentials.length){
    credentials.forEach(c=>{
      lines += `*${c.teamName}*\n`;
      lines += `  Usuario: ${c.email}\n`;
      lines += `  Contraseña: ${c.password}\n`;
      const team = (S.users?.teams||[]).find(t=>t.teamName===c.teamName);
      if(team){
        const members = (team.memberIds||[]).map(id=>(S.users.people||[]).find(p=>p.id===id)).filter(Boolean);
        if(members.length) lines += `  Integrantes: ${members.map(p=>p.name).join(', ')}\n`;
      }
      lines += `\n`;
    });
  } else {
    lines += `_(No hay equipos configurados aún)_\n`;
  }
  lines += `⚠️ Solo puede haber *un dispositivo conectado por equipo*.`;
  const escaped = lines.replace(/`/g,'\\`');
  openModal(`<div style="padding:8px 0">
    <h3 style="margin:0 0 4px;font-size:18px">📋 Comparte en Slack</h3>
    <p style="color:#64748b;font-size:13px;margin:0 0 12px">Copia este mensaje y pégalo en el canal del equipo.</p>
    <textarea id="slack-msg" readonly style="width:100%;box-sizing:border-box;height:220px;background:#0a0e1a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-family:monospace;font-size:13px;padding:12px;resize:none;line-height:1.6">${lines}</textarea>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:12px">
      <button class="btn btn-sm" onclick="closeModal()" style="background:#1e293b;border:1px solid #334155">Cerrar</button>
      <button class="btn btn-primary" onclick="navigator.clipboard.writeText(document.getElementById('slack-msg').value).then(()=>toast('Copiado al portapapeles','success'))">📋 Copiar</button>
    </div>
  </div>`);
}
function togglePause(){
  if(_pauseInFlight) return;
  _pauseInFlight=true;
  S.paused=!S.paused; // optimistic toggle for instant UI feedback
  syncPauseBtn();
  send({type:'ADMIN_TOGGLE_PAUSE'});
  setTimeout(()=>_pauseInFlight=false,1000);
}

function renderPeople(){
  const people=S.users.people||[];
  return `<div>

function renderTeamsAdmin(){
  const teams=S.users.teams||[];
  const assignedIds=new Set(teams.flatMap(t=>t.memberIds||[]));
  const availCount=(S.users.people||[]).filter(p=>p.role==='user'&&!assignedIds.has(p.id)).length;
  return `<div>
    <div class="flex justify-between items-center" style="margin-bottom:1rem">
      <div style="font-size:.82rem;color:var(--text-dim)">${teams.length} equipo(s) · ${availCount} persona(s) sin asignar</div>

    ${teams.map(t=>{
      const memberPeople=(t.memberIds||[]).map(id=>S.users.people?.find(p=>p.id===id)).filter(Boolean);
      const membersHtml=memberPeople.length
        ? memberPeople.map(p=>`<span style="margin-right:6px">${p.name}</span>`).join('')
        : 'Sin miembros';
      return `<div class="user-row">
        <div style="width:14px;height:14px;border-radius:50%;background:${t.color||'#f5a623'};flex-shrink:0"></div>

        <button class="btn btn-danger btn-sm" onclick="delTeam('${t.id}')">✕</button>
      </div>`;
    }).join('')}
  </div>`;
}

function availablePeopleOptions(excludeTeamId=''){
  const assigned=new Set((S.users.teams||[]).filter(t=>t.id!==excludeTeamId).flatMap(t=>t.memberIds||[]));
  return (S.users.people||[]).filter(p=>p.role==='user'&&!assigned.has(p.id));
}

function membersCheckboxes(teamId=''){
  const avail=availablePeopleOptions(teamId);
  const team=teamId?(S.users.teams||[]).find(t=>t.id===teamId):null;
  if(!avail.length&&!team?.memberIds?.length) return `<div style="color:var(--text-dim);font-size:.85rem">No hay personas con rol "Usuario" disponibles. Créalas primero en Personas.</div>`;
  // Si editando, mostrar también los ya asignados a este equipo
  const all=teamId?[...avail,...(team?.memberIds||[]).map(id=>(S.users.people||[]).find(p=>p.id===id)).filter(Boolean)]:avail;
  const unique=[...new Map(all.map(p=>[p.id,p])).values()];
  return unique.map(p=>`<label style="display:flex;align-items:center;gap:.6rem;padding:.4rem 0;cursor:pointer">
    <input type="checkbox" value="${p.id}" ${team?.memberIds?.includes(p.id)?'checked':''} style="width:auto"/>
    <span>${p.name} <span style="color:var(--text-dim);font-size:.78rem">(${p.email})</span></span>

}

function createPerson(){
  const name=$('np-name')?.value.trim(),email=$('np-email')?.value.trim(),pass=$('np-pass')?.value.trim(),role=$('np-role')?.value;
  if(!name||!email||!pass){toast('Todos los campos son obligatorios','error');return;}
  if(pass.length<6){toast('Contraseña mínimo 6 caracteres','error');return;}
  send({type:'ADMIN_CREATE_PERSON',payload:{name,email,password:pass,role}});
}
function updatePerson(id){
  const p={id,name:$('ep-name')?.value.trim(),email:$('ep-email')?.value.trim(),password:$('ep-pass')?.value.trim(),role:$('ep-role')?.value};
  send({type:'ADMIN_UPDATE_PERSON',payload:p});
}
function delPerson(id){if(!confirm('¿Eliminar esta persona?'))return;send({type:'ADMIN_DELETE_PERSON',payload:{id}});}
function createTeam(){
  const teamName=$('ct-name')?.value.trim(), memberIds=getCheckedMembers();
  const color=$('ct-color')?.value||'#f5a623';
  if(!teamName){toast('El nombre del equipo es obligatorio','error');return;}
  if(!memberIds.length){toast('Selecciona al menos un miembro','error');return;}
  send({type:'ADMIN_CREATE_TEAM',payload:{teamName,memberIds,color}});
}
function updateTeam(id){
  const teamName=$('et-name')?.value.trim(), memberIds=getCheckedMembers();
  const color=$('et-color')?.value||'#f5a623';
  send({type:'ADMIN_UPDATE_TEAM',payload:{id,teamName,memberIds,color}});
}
function delTeam(id){if(!confirm('¿Eliminar este equipo? Los miembros quedarán disponibles para otros equipos.'))return;send({type:'ADMIN_DELETE_TEAM',payload:{id}});}

function saveConfig(){
  const keys=['stage1Time','stage1DebateTime','stage2Time','stage2DebateTime','stage3Time','stage3DebateTime','resultsTime','retroTime'];
  const config={};
  keys.forEach(k=>config[k]=Math.max(5,parseInt($(`cfg-${k}`)?.value)||60));
  send({type:'ADMIN_UPDATE_CONFIG',payload:{config}});
}

function renderLog(){
  const s=S.session; if(!s) return noSession();
  const log=[...(s.eventLog||[])].reverse();
  if(!log.length) return `<div style="max-width:800px"><h2 style="font-size:1.3rem;font-weight:700;margin-bottom:1.5rem">Log de sesión · <span style="font-family:var(--font-mono);color:var(--accent)">${s.roomCode}</span></h2><div class="card text-center" style="color:var(--text-dim);padding:3rem"><div style="font-size:2rem;margin-bottom:1rem">🪵</div>Sin eventos registrados aún</div></div>`;
  return `<div style="max-width:900px">
    <div class="flex justify-between items-center" style="margin-bottom:1.5rem">
      <h2 style="font-size:1.3rem;font-weight:700">Log · <span style="font-family:var(--font-mono);color:var(--accent)">${s.roomCode}</span></h2>
      <span style="font-size:.78rem;color:var(--text-dim)">${log.length} eventos (más reciente primero)</span>
    </div>
    <div class="flex col gap-1" style="font-family:var(--font-mono);font-size:.78rem">
      ${log.map(renderLogEntry).join('')}
    </div>
  </div>`;
}
function renderLogEntry(e){
  const d=new Date(e.ts);
  const ts=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
  const colorMap={
    SESSION_STARTED:'var(--green)',SESSION_FINISHED:'var(--accent)',
    SESSION_PARTICIPANTS_SNAPSHOT:'var(--blue)',
    STAGE_CHANGE:'var(--blue)',CASE_RESOLVED:'var(--accent)',NEXT_CASE:'var(--accent)',
    TEAM_SKIP:'#f97316',TEAM_ANSWER:'var(--blue)',
    TIMER_PAUSED:'var(--red)',TIMER_RESUMED:'var(--green)',
    CLIENT_CONNECTED:'var(--green)',CLIENT_DISCONNECTED:'var(--red)',
    SERVER_RESTART:'#c084fc',
  };
  const col=colorMap[e.ev]||'var(--text-dim)';
  // Solo mostrar [Caso N] si estamos en sesión activa (no en LOBBY)
  const caseTag=e.ci!==undefined&&e.ci!==null&&e.stage&&e.stage!=='LOBBY'?`<span style="color:var(--text-dim)">[Caso ${e.ci+1}]</span> `:'';
  // Etapa abreviada para conexiones/desconexiones
  const stageShort={'STAGE_1':'E1','STAGE_1_DEBATE':'E1D','STAGE_2':'E2','STAGE_2_DEBATE':'E2D','STAGE_3':'E3','STAGE_3_DEBATE':'E3D','STAGE_4':'E4','RESULTS':'RES','LOBBY':'LOBBY'};
  let detail='';
  if(e.ev==='TEAM_ANSWER'){
    const ok=e.correctAnswerIndex!==undefined&&e.answerIndex===e.correctAnswerIndex;
    detail=` — ${e.teamName} → <strong>${e.answerLabel||e.answerIndex}</strong> "${e.answerText||''}" ${ok?'<span style="color:var(--green)">✓ CORRECTO</span>':'<span style="color:var(--red)">✗ INCORRECTO</span>'} (correcta: ${e.correctAnswerLabel||e.correctAnswerIndex})${e.isSkipper?' ⚡adelantó':''}`;
  } else if(e.ev==='TEAM_SKIP'){
    detail=` — ${e.teamName}`;
  } else if(e.ev==='STAGE_CHANGE'){
    detail=` → ${e.newStage}`;
  } else if(e.ev==='CASE_RESOLVED'){
    const corrLbl=e.correctAnswerLabel||(e.correctAnswerIndex!==undefined?String.fromCharCode(65+e.correctAnswerIndex):'?');
    detail=e.results?` <span style="color:var(--green)">[Correcta: ${corrLbl}]</span> — ${e.results.map(r=>`${r.teamName}: <strong>${r.answerLabel||r.answerIndex||'—'}</strong> ${r.isCorrect?'<span style="color:var(--green)">✓</span>':'<span style="color:var(--red)">✗</span>'} (${r.pts>0?'+':''}${r.pts}pts)`).join(' | ')}`:` — ${e.caseTitle||''}`;
  } else if(e.ev==='NEXT_CASE'){
    detail=` → Caso ${(e.newCaseIndex||0)+1} "${e.caseTitle||''}"`;
  } else if(e.ev==='CLIENT_CONNECTED'||e.ev==='CLIENT_DISCONNECTED'){
    const stageInfo=e.stage?` <span style="color:var(--text-dim);font-size:.7rem">[${stageShort[e.stage]||e.stage}]</span>`:'';
    const reasonInfo=e.reason&&e.ev==='CLIENT_DISCONNECTED'?` <span style="color:var(--text-dim)">(${e.reason})</span>`:'';
    detail=` — ${e.name} (${e.role})${stageInfo}${reasonInfo}`;
  } else if(e.ev==='SESSION_PARTICIPANTS_SNAPSHOT'){
    detail=` — ${(e.participants||[]).map(p=>p.startsWith('team:')?p.slice(5):p).join(', ')}`;
  } else if(e.ev==='TIMER_PAUSED'){
    detail=` — ${e.remaining}s restantes${e.byDisconnect?' (desconexión)':''}`;
  } else if(e.ev==='TIMER_RESUMED'){
    detail=` — ${e.remaining}s`;
  } else if(e.ev==='SERVER_RESTART'){
    detail=` — ${e.action}${e.stage?' en '+e.stage:''}${e.remaining?' ('+e.remaining+'s restantes)':''}`;
  } else if(e.ev==='SESSION_STARTED'){
    detail=` — ${e.teamsCount} equipos · ${e.casesCount} casos`;
  }
  return `<div style="padding:.4rem .75rem;border-radius:6px;border-left:3px solid ${col};background:rgba(0,0,0,.25);display:flex;gap:.75rem;align-items:baseline">
    <span style="color:var(--text-dim);flex-shrink:0">${ts}</span>
    <span style="color:${col};font-weight:700;flex-shrink:0">${e.ev}</span>
    <span style="color:var(--text-dim)">${caseTag}<span style="color:var(--text)">${detail}</span></span>
  </div>`;
}

function renderProjector(){
  const s=S.session;
  if(!s) return `<div style="height:100vh;display:flex;align-items:center;justify-content:center"><div class="spinner"></div></div>`;
  if(s.status==='LOBBY') return projLobby(s);
  if(s.status==='FINISHED'&&S.podiumMode==='suspense') return projPodiumSuspense();
  if(s.status==='FINISHED'&&S.podiumMode==='reveal') return projPodiumReveal();
  if(s.status==='FINISHED') return projFinished();
  if(s.currentStage==='RESULTS' && S.quizReveal) return projQuizReveal(s);
  if(s.currentStage==='RESULTS') return projResults(s);
  if(s.currentStage==='STAGE_RETRO') return projRetro(s);
  if(s.currentStage==='STAGE_4') return projQuiz(s);
  return projStage(s);
}

function _glAvatar(username,size=30){
  const initials=(username||'FL').split(/[._@-]/).map(p=>p[0]?.toUpperCase()||'').join('').slice(0,2)||'FL';
  const cols=['#7c3aed','#2563eb','#0891b2','#059669','#d97706','#dc2626','#db2777','#0d9488'];
  let h=0; for(const c of(username||'')) h=(h*31+c.charCodeAt(0))&0xffff;
  const bg=cols[h%cols.length];
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${bg};display:flex;align-items:center;justify-content:center;font-size:${Math.floor(size*.38)}px;font-weight:700;color:#fff;flex-shrink:0;letter-spacing:-.02em">${initials}</div>`;
}

function _glLabelStyle(label){
  const l=label.toLowerCase();
  if(l.includes('critic')||l.includes('urgent')||l.includes('expedite')) return 'background:rgba(239,68,68,.2);color:#fca5a5;border:1px solid rgba(239,68,68,.35)';
  if(l.includes('almac')) return 'background:rgba(245,166,35,.15);color:#fcd34d;border:1px solid rgba(245,166,35,.3)';
  if(l.includes('desplegado')||l.includes('done')||l.includes('resuelto')) return 'background:rgba(34,197,94,.15);color:#86efac;border:1px solid rgba(34,197,94,.3)';
  if(l.includes('doing')||l.includes('progress')) return 'background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.3)';
  return 'background:rgba(139,92,246,.1);color:#c4b5fd;border:1px solid rgba(139,92,246,.25)';
}
